<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Media Pulse</title>
<style>
:root {
  --surface-1:#fcfcfb; --page:#f9f9f7;
  --ink-1:#0b0b0b; --ink-2:#52514e; --ink-3:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,0.10);
  --s-meta:#2a78d6; --s-google:#eda100; --s-tiktok:#1baf7a; --s-other:#4a3aa7;
  --seq-250:#86b6ef;
  --st-good:#0ca30c; --st-warn:#fab219; --st-serious:#ec835a; --st-crit:#d03b3b;
  --delta-good:#006300; --delta-bad:#d03b3b;
  --wash:rgba(42,120,214,0.10);
}
:root[data-theme="dark"] {
  --surface-1:#1a1a19; --page:#0d0d0d;
  --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
  --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,0.10);
  --s-meta:#3987e5; --s-google:#c98500; --s-tiktok:#199e70; --s-other:#9085e9;
  --seq-250:#1c5cab;
  --delta-good:#0ca30c; --delta-bad:#e66767;
  --wash:rgba(57,135,229,0.12);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --surface-1:#1a1a19; --page:#0d0d0d;
    --ink-1:#ffffff; --ink-2:#c3c2b7; --ink-3:#898781;
    --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,0.10);
    --s-meta:#3987e5; --s-google:#c98500; --s-tiktok:#199e70; --s-other:#9085e9;
    --seq-250:#1c5cab;
    --delta-good:#0ca30c; --delta-bad:#e66767;
    --wash:rgba(57,135,229,0.12);
  }
}
* { box-sizing:border-box; }
body {
  margin:0; background:var(--page); color:var(--ink-1);
  font:14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
}
.wrap { max-width:1240px; margin:0 auto; padding:20px 20px 60px; }
.card {
  background:var(--surface-1); border:1px solid var(--border);
  border-radius:10px; padding:16px 18px; margin-bottom:16px;
}
h1 { font-size:20px; margin:0; font-weight:650; }
h2 { font-size:14px; margin:0 0 10px; font-weight:650; color:var(--ink-1); }
.sub { color:var(--ink-2); font-size:12.5px; }
.muted { color:var(--ink-3); }
.mono { font-variant-numeric: tabular-nums; }

/* header */
.hdr { display:flex; flex-wrap:wrap; align-items:baseline; gap:10px 16px; margin-bottom:14px; }
.chip {
  display:inline-flex; align-items:center; gap:6px; padding:3px 10px;
  border:1px solid var(--border); border-radius:999px; font-size:12px; color:var(--ink-2);
  background:var(--surface-1);
}
.chip b { color:var(--ink-1); }
.spacer { flex:1; }
button.ghost {
  background:none; border:1px solid var(--border); border-radius:8px; color:var(--ink-2);
  padding:4px 10px; font:inherit; font-size:12px; cursor:pointer;
}
button.ghost:hover { color:var(--ink-1); }

/* filter row */
.filters { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; }
.seg { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--surface-1); }
.seg button {
  background:none; border:none; padding:6px 14px; font:inherit; font-size:12.5px;
  color:var(--ink-2); cursor:pointer; border-right:1px solid var(--border);
}
.seg button:last-child { border-right:none; }
.seg button[aria-pressed="true"] { color:var(--ink-1); font-weight:650; background:var(--wash); }
input.search {
  background:var(--surface-1); color:var(--ink-1); border:1px solid var(--border);
  border-radius:8px; padding:6px 10px; font:inherit; font-size:12.5px; width:220px;
}

/* stat tiles */
.tiles { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px,1fr)); gap:12px; margin-bottom:16px; }
.tile { background:var(--surface-1); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
.tile .lbl { font-size:12px; color:var(--ink-2); margin-bottom:4px; }
.tile .val { font-size:26px; font-weight:600; }
.tile .delta { font-size:12px; margin-top:2px; }
.delta.up { color:var(--delta-good); } .delta.down { color:var(--delta-bad); }
.tile svg { display:block; margin-top:6px; }

/* charts */
.chartbox { position:relative; }
.crosshair { position:absolute; top:0; width:1px; background:var(--axis); pointer-events:none; display:none; }
.tooltip {
  position:absolute; pointer-events:none; display:none; z-index:5;
  background:var(--surface-1); border:1px solid var(--border); border-radius:8px;
  padding:8px 10px; font-size:12px; box-shadow:0 4px 14px rgba(0,0,0,0.18); min-width:150px;
}
.tooltip .tt-date { color:var(--ink-3); margin-bottom:4px; }
.tooltip .row { display:flex; align-items:center; gap:6px; margin:2px 0; }
.tooltip .key { width:12px; height:2px; border-radius:1px; flex:none; }
.tooltip .v { font-weight:650; margin-left:auto; padding-left:12px; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--ink-2); margin-top:6px; }
.legend .key { display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:5px; vertical-align:-2px; }
.legend .keyline { display:inline-block; width:14px; height:2px; border-radius:1px; margin-right:5px; vertical-align:3px; }

/* tables */
table { width:100%; border-collapse:collapse; font-size:12.5px; }
th, td { text-align:right; padding:7px 8px; border-bottom:1px solid var(--grid); white-space:nowrap; }
th:first-child, td:first-child { text-align:left; }
th {
  color:var(--ink-3); font-weight:500; font-size:11.5px; cursor:pointer; user-select:none;
  position:sticky; top:0; background:var(--surface-1);
}
th.sorted { color:var(--ink-1); font-weight:650; }
td.name { max-width:340px; overflow:hidden; text-overflow:ellipsis; text-align:left; }
td .pdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
tr:hover td { background:var(--wash); }
td.num { font-variant-numeric:tabular-nums; }
.badge {
  display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 8px;
  border-radius:999px; border:1px solid var(--border); color:var(--ink-2); font-weight:600;
}
.badge .dot { width:7px; height:7px; border-radius:50%; }
.b-scale .dot { background:var(--st-good); } .b-scale { color:var(--st-good); }
.b-goal .dot { background:var(--st-good); }
.b-watch .dot { background:var(--st-warn); }
.b-fix .dot { background:var(--st-crit); } .b-fix { color:var(--st-crit); }
.b-na .dot { background:var(--ink-3); }
.roascell { font-weight:650; }

/* insights */
.insights { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:12px; }
.insights ul { margin:0; padding-left:0; list-style:none; }
.insights li { padding:7px 0 7px 22px; position:relative; border-bottom:1px solid var(--grid); font-size:13px; }
.insights li:last-child { border-bottom:none; }
.insights li::before {
  content:""; position:absolute; left:4px; top:13px; width:8px; height:8px; border-radius:50%;
}
li.sev-good::before { background:var(--st-good); }
li.sev-warn::before { background:var(--st-warn); }
li.sev-bad::before { background:var(--st-crit); }
li.sev-info::before { background:var(--s-other); }
li.sev-act::before { background:var(--s-meta); }
.ctx li::before { background:var(--ink-3); }
.ctx .d { color:var(--ink-3); font-size:11px; margin-right:6px; }
details summary { cursor:pointer; color:var(--ink-2); font-size:13px; font-weight:600; padding:4px 0; }
footer { color:var(--ink-3); font-size:11.5px; margin-top:24px; }
footer li { margin:3px 0; }

/* unlock */
#lock { max-width:360px; margin:18vh auto; text-align:center; }
#lock input {
  width:100%; padding:10px 12px; font:inherit; border:1px solid var(--border);
  border-radius:8px; background:var(--surface-1); color:var(--ink-1); margin:14px 0 10px;
}
#lock button { width:100%; padding:10px; font:inherit; font-weight:600; border:none; border-radius:8px;
  background:var(--s-meta); color:#fff; cursor:pointer; }
#lock .err { color:var(--st-crit); font-size:12.5px; min-height:18px; }
#app { display:none; }
.maturity-note { font-size:11.5px; color:var(--ink-3); margin-top:4px; }
@media (max-width:720px){ td.name{max-width:180px;} .tile .val{font-size:22px;} }
</style>
</head>
<body>

<div id="lock" class="card">
  <h1>Media Pulse</h1>
  <p class="sub">Enter the team passphrase to unlock.</p>
  <input id="pw" type="password" placeholder="Passphrase" autocomplete="current-password">
  <div class="err" id="pwerr"></div>
  <button id="unlock">Unlock</button>
</div>

<div id="app" class="wrap"></div>

<script>
"use strict";
/* ---------- crypto ---------- */
async function deriveKey(pass, salt, iter) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:iter, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decryptEnvelope(env, pass) {
  const key = await deriveKey(pass, b64(env.salt), env.iter);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(env.iv)}, key, b64(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ---------- state ---------- */
let DATA = null;
let winSel = "L7";        // L1 | L7 | L14
let platSel = "all";      // all | meta | google | tiktok
let levelSel = "campaign";
let sortCol = "spend", sortDir = -1, query = "";
const PLAT_COLOR = { meta:"var(--s-meta)", google:"var(--s-google)", tiktok:"var(--s-tiktok)" };
const PLAT_LABEL = { meta:"Meta", google:"Google", tiktok:"TikTok" };
const fm$ = v => "$" + Math.round(v).toLocaleString("en-US");
const fmK = v => v >= 10000 ? "$" + (v/1000).toFixed(0) + "K" : fm$(v);
const fmR = v => v == null ? "–" : v.toFixed(2);
const esc = document.createElement("div");
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

/* ---------- boot ---------- */
async function tryUnlock(pass) {
  const res = await fetch("data.enc", {cache:"no-store"});
  if (!res.ok) throw new Error("data.enc not found");
  const env = JSON.parse(await res.text());
  DATA = await decryptEnvelope(env, pass);
}
document.getElementById("unlock").addEventListener("click", go);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
async function go() {
  const pass = document.getElementById("pw").value.trim();
  if (!pass) return;
  try {
    await tryUnlock(pass);
    localStorage.setItem("mp_pass", pass);
    document.getElementById("lock").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } catch (e) {
    document.getElementById("pwerr").textContent = "Wrong passphrase (or data missing).";
  }
}
(async () => {
  const saved = localStorage.getItem("mp_pass");
  if (saved) {
    try {
      await tryUnlock(saved);
      document.getElementById("lock").style.display = "none";
      document.getElementById("app").style.display = "block";
      render();
    } catch (e) { localStorage.removeItem("mp_pass"); }
  }
})();

/* ---------- derived series ---------- */
function dailySeries() {
  // per-date: spend per platform (all buckets), core rev7/spend for ROAS line
  const by = {};
  for (const c of DATA.levels.campaign) {
    for (const d of c.daily) {
      const o = by[d.date] || (by[d.date] = {meta:0, google:0, tiktok:0, coreSpend:0, coreRev:0});
      if (o[c.platform] != null) o[c.platform] += d.spend || 0;
      if (c.bucket === "core") { o.coreSpend += d.spend || 0; o.coreRev += d.rev7 || 0; }
    }
  }
  return Object.keys(by).sort().map(date => ({date, ...by[date],
    roas: by[date].coreSpend > 0 ? by[date].coreRev / by[date].coreSpend : null}));
}

/* ---------- svg helpers ---------- */
const SVG = "http://www.w3.org/2000/svg";
function sv(tag, attrs) {
  const n = document.createElementNS(SVG, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}
function sparkline(vals, w, h, goal) {
  const svg = sv("svg", {width:w, height:h, viewBox:`0 0 ${w} ${h}`});
  const nums = vals.filter(v => v != null);
  if (nums.length < 2) return svg;
  const max = Math.max(...nums, goal || 0) * 1.1 || 1;
  const min = 0;
  const pts = vals.map((v, i) => v == null ? null :
    [i / (vals.length - 1) * (w - 6) + 3, h - 3 - (v - min) / (max - min) * (h - 8)]);
  if (goal != null) {
    const gy = h - 3 - (goal - min) / (max - min) * (h - 8);
    svg.appendChild(sv("line", {x1:0, x2:w, y1:gy, y2:gy, stroke:"var(--axis)", "stroke-width":1, "stroke-dasharray":"3,3"}));
  }
  let dstr = "", started = false;
  pts.forEach(p => { if (!p) { started = false; return; }
    dstr += (started ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1); started = true; });
  svg.appendChild(sv("path", {d:dstr, fill:"none", stroke:"var(--seq-250)", "stroke-width":2, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  const last = [...pts].reverse().find(p => p);
  if (last) {
    svg.appendChild(sv("circle", {cx:last[0], cy:last[1], r:4, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
  }
  return svg;
}

/* ---------- main trend chart: two panels, shared x ---------- */
function trendChart(days) {
  const box = el("div", "chartbox");
  const W = Math.min(1180, Math.max(640, (document.getElementById("app").clientWidth || 1000) - 40));
  const H1 = 150, H2 = 130, GAP = 26, padL = 44, padR = 14, AXH = 20;
  const H = H1 + GAP + H2 + AXH;
  const svg = sv("svg", {width:"100%", height:H, viewBox:`0 0 ${W} ${H}`, style:"display:block"});
  const n = days.length;
  const x = i => padL + (n === 1 ? 0 : i / (n - 1) * (W - padL - padR));
  const goal = DATA.meta.goal_roas;

  /* panel 1: core NB ROAS line */
  const roasVals = days.map(d => d.roas);
  const rmax = Math.max(goal * 1.3, ...roasVals.filter(v => v != null)) * 1.08;
  const ry = v => H1 - 8 - (v / rmax) * (H1 - 22);
  [0, goal, Math.round(rmax * 2) / 2].filter((v, i, a) => a.indexOf(v) === i).forEach(v => {
    if (v > rmax) return;
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(v), y2:ry(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:ry(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = v.toFixed(1); svg.appendChild(t);
  });
  // goal hairline emphasized
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(goal), y2:ry(goal), stroke:"var(--axis)", "stroke-width":1.5, "stroke-dasharray":"5,4"}));
  const gt = sv("text", {x:W - padR, y:ry(goal) - 5, "text-anchor":"end", fill:"var(--ink-2)", "font-size":10.5, "font-weight":600});
  gt.textContent = "goal " + goal.toFixed(1); svg.appendChild(gt);
  // maturity wash: last 7 days
  if (n > 7) {
    svg.appendChild(sv("rect", {x:x(n - 7), y:8, width:x(n - 1) - x(n - 7), height:H1 - 16,
      fill:"var(--wash)"}));
  }
  let d1 = "", st = false;
  days.forEach((d, i) => { if (d.roas == null) { st = false; return; }
    d1 += (st ? "L" : "M") + x(i).toFixed(1) + "," + ry(d.roas).toFixed(1); st = true; });
  svg.appendChild(sv("path", {d:d1, fill:"none", stroke:"var(--s-meta)", "stroke-width":2, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  const lastIdx = days.map(d => d.roas).lastIndexOf(days.map(d => d.roas).filter(v => v != null).pop());
  if (lastIdx >= 0) {
    svg.appendChild(sv("circle", {cx:x(lastIdx), cy:ry(days[lastIdx].roas), r:4.5, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
    const vt = sv("text", {x:x(lastIdx) - 8, y:ry(days[lastIdx].roas) - 9, "text-anchor":"end", fill:"var(--ink-1)", "font-size":11, "font-weight":650});
    vt.textContent = days[lastIdx].roas.toFixed(2); svg.appendChild(vt);
  }
  const p1t = sv("text", {x:padL, y:14, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p1t.textContent = "Core NB ROAS by day (clicks + det. views, 7d, accrual)"; svg.appendChild(p1t);

  /* panel 2: stacked spend bars by channel */
  const top2 = H1 + GAP;
  const smax = Math.max(...days.map(d => d.meta + d.google + d.tiktok)) * 1.12 || 1;
  const sy = v => top2 + (H2 - 14) - (v / smax) * (H2 - 26);
  [0, Math.round(smax / 2000) * 1000, Math.round(smax / 1000) * 1000].filter((v,i,a)=>v>0&&a.indexOf(v)===i&&v<smax).forEach(v => {
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(v), y2:sy(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:sy(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = "$" + (v / 1000) + "K"; svg.appendChild(t);
  });
  const bw = Math.min(24, Math.max(3, (W - padL - padR) / n - 2));
  const order = ["meta", "google", "tiktok"];
  days.forEach((d, i) => {
    let acc = 0;
    order.forEach(p => {
      const v = d[p]; if (!v) return;
      const y1 = sy(acc + v), y0 = sy(acc);
      const hpx = Math.max(0, y0 - y1 - 1);  // 2px gap total between segments (1 shaved each side)
      const r = acc === 0 ? 0 : 2;
      svg.appendChild(sv("rect", {x:x(i) - bw / 2, y:y1 + (acc ? 1 : 0), width:bw, height:hpx,
        rx:3, fill:`var(--s-${p})`}));
      acc += v;
    });
  });
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(0), y2:sy(0), stroke:"var(--axis)", "stroke-width":1}));
  const p2t = sv("text", {x:padL, y:top2 + 4, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p2t.textContent = "Daily spend by channel"; svg.appendChild(p2t);

  /* x axis labels */
  const step = Math.ceil(n / 8);
  days.forEach((d, i) => {
    if (i % step !== 0 && i !== n - 1) return;
    const t = sv("text", {x:x(i), y:H - 4, "text-anchor":"middle", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = d.date.slice(5).replace("-", "/"); svg.appendChild(t);
  });

  box.appendChild(svg);
  /* legend */
  const leg = el("div", "legend");
  const lr = el("span"); const lk = el("span", "keyline"); lk.style.background = "var(--s-meta)";
  lr.appendChild(lk); lr.appendChild(document.createTextNode("Core ROAS")); leg.appendChild(lr);
  order.forEach(p => {
    const s = el("span"); const k = el("span", "key"); k.style.background = `var(--s-${p})`;
    s.appendChild(k); s.appendChild(document.createTextNode(PLAT_LABEL[p] + " spend"));
    leg.appendChild(s);
  });
  const mw = el("span", "muted"); mw.textContent = "shaded = accrual still maturing"; leg.appendChild(mw);
  box.appendChild(leg);

  /* crosshair + tooltip */
  const ch = el("div", "crosshair"); ch.style.height = (H - AXH) + "px"; box.appendChild(ch);
  const tt = el("div", "tooltip"); box.appendChild(tt);
  svg.addEventListener("pointermove", ev => {
    const rect = svg.getBoundingClientRect();
    const scale = W / rect.width;
    const px = (ev.clientX - rect.left) * scale;
    let best = 0, bd = 1e9;
    for (let i = 0; i < n; i++) { const dd = Math.abs(x(i) - px); if (dd < bd) { bd = dd; best = i; } }
    const d = days[best];
    ch.style.left = (x(best) / scale) + "px"; ch.style.display = "block";
    tt.replaceChildren();
    tt.appendChild(el("div", "tt-date", d.date));
    const addRow = (color, label, val, line) => {
      const r = el("div", "row");
      const k = el("span", "key"); k.style.background = color; if (!line) { k.style.height = "8px"; k.style.borderRadius = "2px"; }
      r.appendChild(k); r.appendChild(el("span", null, label)); r.appendChild(el("span", "v", val));
      tt.appendChild(r);
    };
    addRow("var(--s-meta)", "Core ROAS", d.roas == null ? "–" : d.roas.toFixed(2), true);
    order.forEach(p => addRow(`var(--s-${p})`, PLAT_LABEL[p], fm$(d[p] || 0)));
    addRow("var(--axis)", "Total spend", fm$(d.meta + d.google + d.tiktok));
    tt.style.display = "block";
    const ttw = tt.offsetWidth;
    const lx = x(best) / scale;
    tt.style.left = Math.min(Math.max(lx + 12, 0), rect.width - ttw - 4) + "px";
    tt.style.top = "30px";
    if (lx + 12 + ttw > rect.width) tt.style.left = (lx - ttw - 12) + "px";
  });
  svg.addEventListener("pointerleave", () => { ch.style.display = "none"; tt.style.display = "none"; });
  return box;
}

/* ---------- tables ---------- */
function statusBadge(e) {
  const goal = DATA.meta.goal_roas;
  if (e.platform === "tiktok") return ["b-na", "TikTok — NB broken"];
  if (e.bucket === "tof") return ["b-na", "TOF"];
  if (e.bucket === "brand") return ["b-na", "Brand"];
  const w = e.windows[winSel === "L1" ? "L7" : winSel];   // judge on >= 7d always
  if (!w || (w.spend || 0) < 250 || w.roas7 == null) return ["b-na", "Low data"];
  if (w.roas7 >= goal * 1.2) return ["b-scale", "Scale ↑"];
  if (w.roas7 >= goal) return ["b-goal", "On goal"];
  if (w.roas7 >= 1.5) return ["b-watch", "Watch"];
  return ["b-fix", "Fix / cut"];
}
function entityName(e) {
  if (levelSel === "campaign") return e.campaign_name || e.campaign_id;
  if (levelSel === "adset") return (e.adset_name || e.adset_id) ;
  return (e.ad_name || e.ad_id);
}
function entitySub(e) {
  if (levelSel === "campaign") return "";
  if (levelSel === "adset") return e.campaign_name;
  return e.campaign_name + " · " + (e.adset_name || "");
}
function renderTable(container) {
  container.replaceChildren();
  const goal = DATA.meta.goal_roas;
  let rows = DATA.levels[levelSel].filter(e => platSel === "all" || e.platform === platSel);
  if (query) {
    const q = query.toLowerCase();
    rows = rows.filter(e => (entityName(e) + " " + entitySub(e)).toLowerCase().includes(q));
  }
  const W = winSel;
  const get = {
    name: e => entityName(e).toLowerCase(),
    spend: e => e.windows[W].spend || 0,
    roas: e => e.windows[W].roas7 ?? -1,
    rev: e => e.windows[W].rev7 || 0,
    txns: e => e.windows[W].txns || 0,
    proas: e => e.windows[W].p_roas ?? -1,
    delta: e => {
      const a = e.windows.L7.roas7, b = e.windows.P7.roas7;
      return (a != null && b) ? (a - b) / b : -99;
    },
  };
  rows.sort((a, b) => {
    const va = get[sortCol](a), vb = get[sortCol](b);
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });

  const cols = [
    ["name", "Name"], ["spend", "Spend"], ["roas", "NB ROAS"], ["rev", "NB Rev"],
    ["txns", "Txns"], ["proas", "Platform ROAS"], ["delta", "Δ WoW"], ["trend", "14d trend"], ["st", "Status"],
  ];
  const table = el("table");
  const thead = el("thead"); const trh = el("tr");
  cols.forEach(([id, label]) => {
    const th = el("th", sortCol === id ? "sorted" : null, label + (sortCol === id ? (sortDir < 0 ? " ↓" : " ↑") : ""));
    if (!["trend", "st"].includes(id)) th.addEventListener("click", () => {
      if (sortCol === id) sortDir *= -1; else { sortCol = id; sortDir = -1; }
      renderTable(container);
    });
    trh.appendChild(th);
  });
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = el("tbody");
  const shown = rows.slice(0, 60);
  for (const e of shown) {
    const w = e.windows[W];
    const tr = el("tr");
    const nameTd = el("td", "name");
    const pd = el("span", "pdot"); pd.style.background = PLAT_COLOR[e.platform] || "var(--s-other)";
    nameTd.appendChild(pd);
    nameTd.appendChild(document.createTextNode(entityName(e)));
    if (entitySub(e)) { const s = el("div", "muted"); s.style.fontSize = "11px"; s.textContent = entitySub(e); nameTd.appendChild(s); }
    nameTd.title = entityName(e) + (entitySub(e) ? " — " + entitySub(e) : "");
    tr.appendChild(nameTd);
    tr.appendChild(el("td", "num", fm$(w.spend || 0)));
    const rc = el("td", "num roascell", fmR(w.roas7));
    if (w.roas7 != null && (w.spend || 0) >= 100 && e.bucket === "core" && e.platform !== "tiktok")
      rc.style.color = w.roas7 >= goal ? "var(--st-good)" : (w.roas7 >= 1.5 ? "inherit" : "var(--st-crit)");
    tr.appendChild(rc);
    tr.appendChild(el("td", "num", fm$(w.rev7 || 0)));
    tr.appendChild(el("td", "num", String(w.txns || 0)));
    tr.appendChild(el("td", "num muted", e.platform === "google" ? fmR(w.p_roas) : "–"));
    const dv = get.delta(e);
    const dtd = el("td", "num", dv <= -90 ? "–" : (dv > 0 ? "+" : "") + Math.round(dv * 100) + "%");
    if (dv > -90) dtd.className += dv >= 0 ? " delta up" : " delta down";
    tr.appendChild(dtd);
    const sp = el("td");
    const series = e.daily.slice(-14).map(d => d.spend > 0 ? (d.rev7 || 0) / d.spend : null);
    sp.appendChild(sparkline(series, 90, 26, goal));
    tr.appendChild(sp);
    const [bc, bl] = statusBadge(e);
    const btd = el("td");
    const b = el("span", "badge " + bc); b.appendChild(el("span", "dot")); b.appendChild(document.createTextNode(bl));
    btd.appendChild(b); tr.appendChild(btd);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);
  if (rows.length > shown.length) {
    container.appendChild(el("div", "muted", `Showing top ${shown.length} of ${rows.length} by current sort — use search to narrow.`));
  }
}

/* ---------- channel summary ---------- */
function channelSummary() {
  const groups = {
    "Meta (core)":      e => e.platform === "meta" && e.bucket === "core",
    "Google (core)":    e => e.platform === "google" && e.bucket === "core",
    "Google Brand":     e => e.platform === "google" && e.bucket === "brand",
    "Demand Gen (TOF)": e => e.bucket === "tof",
    "TikTok":           e => e.platform === "tiktok",
  };
  const card = el("div", "card");
  card.appendChild(el("h2", null, "Channel allocation"));
  const table = el("table");
  const trh = el("tr");
  ["Bucket", "L7 spend", "share", "L7 NB ROAS", "Δ WoW", "L14 NB ROAS", "L7 platform ROAS"].forEach((h, i) => {
    const th = el("th", null, h); if (i === 0) th.style.textAlign = "left"; trh.appendChild(th);
  });
  table.appendChild(trh);
  const camps = DATA.levels.campaign;
  const totalL7 = camps.reduce((s, c) => s + (c.windows.L7.spend || 0), 0);
  for (const [label, pred] of Object.entries(groups)) {
    const g = camps.filter(pred);
    if (!g.length) continue;
    const agg = w => {
      const s = g.reduce((a, c) => a + (c.windows[w].spend || 0), 0);
      const r = g.reduce((a, c) => a + (c.windows[w].rev7 || 0), 0);
      const pv = g.reduce((a, c) => a + (c.windows[w].p_value || 0), 0);
      const ps = g.reduce((a, c) => a + (c.windows[w].p_spend || 0), 0);
      return {s, roas: s > 0 ? r / s : null, proas: ps > 0 ? pv / ps : null};
    };
    const l7 = agg("L7"), p7 = agg("P7"), l14 = agg("L14");
    const tr = el("tr");
    const nt = el("td", null, label); nt.style.textAlign = "left"; nt.style.fontWeight = "600"; tr.appendChild(nt);
    tr.appendChild(el("td", "num", fm$(l7.s)));
    tr.appendChild(el("td", "num muted", totalL7 ? Math.round(l7.s / totalL7 * 100) + "%" : "–"));
    const rtd = el("td", "num roascell", fmR(l7.roas)); tr.appendChild(rtd);
    const d = (l7.roas != null && p7.roas) ? (l7.roas - p7.roas) / p7.roas : null;
    const dtd = el("td", "num", d == null ? "–" : (d > 0 ? "+" : "") + Math.round(d * 100) + "%");
    if (d != null) dtd.className += d >= 0 ? " delta up" : " delta down";
    tr.appendChild(dtd);
    tr.appendChild(el("td", "num", fmR(l14.roas)));
    tr.appendChild(el("td", "num muted", l7.proas ? fmR(l7.proas) : "–"));
    table.appendChild(tr);
  }
  card.appendChild(table);
  const n = el("div", "maturity-note");
  n.textContent = "TOF and Brand are excluded from core ROAS. TikTok NB attribution is currently broken (understates) — judge TikTok on model views / MER.";
  card.appendChild(n);
  return card;
}

/* ---------- render ---------- */
function render() {
  const app = document.getElementById("app");
  app.replaceChildren();
  const m = DATA.meta;
  document.title = m.client + " — Media Pulse";

  /* header */
  const hdr = el("div", "hdr");
  hdr.appendChild(el("h1", null, m.client + " — Media Pulse"));
  const gc = el("span", "chip"); gc.appendChild(document.createTextNode("Goal ")); const gb = el("b", null, m.goal_roas.toFixed(1) + " ROAS"); gc.appendChild(gb); hdr.appendChild(gc);
  hdr.appendChild(el("span", "chip", m.attribution_label));
  hdr.appendChild(el("span", "chip", "Data through " + m.data_through));
  hdr.appendChild(el("span", "spacer"));
  const th = el("button", "ghost", "Theme");
  th.addEventListener("click", () => {
    const r = document.documentElement;
    const cur = r.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    r.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
    render();
  });
  hdr.appendChild(th);
  app.appendChild(hdr);

  /* tiles */
  const s = DATA.insights.summary;
  const tiles = el("div", "tiles");
  const goal = m.goal_roas;
  const days = dailySeries();
  const mk = (lbl, val, deltaTxt, deltaCls, spark) => {
    const t = el("div", "tile");
    t.appendChild(el("div", "lbl", lbl));
    t.appendChild(el("div", "val", val));
    if (deltaTxt) t.appendChild(el("div", "delta " + (deltaCls || ""), deltaTxt));
    if (spark) t.appendChild(spark);
    return t;
  };
  const coreDays = days.map(d => d.roas);
  const p7roas = (() => {
    const c = DATA.levels.campaign.filter(x => x.bucket === "core");
    const sp = c.reduce((a, x) => a + (x.windows.P7.spend || 0), 0);
    const rv = c.reduce((a, x) => a + (x.windows.P7.rev7 || 0), 0);
    return sp > 0 ? rv / sp : null;
  })();
  const coreRoas = s.core_roas_l7;
  let dTxt = null, dCls = null;
  if (coreRoas != null && p7roas) {
    const dd = (coreRoas - p7roas) / p7roas;
    dTxt = (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs prior 7d";
    dCls = dd >= 0 ? "up" : "down";
  }
  const t1 = mk("Core NB ROAS — last 7 days", coreRoas == null ? "–" : coreRoas.toFixed(2), dTxt, dCls,
    sparkline(coreDays.slice(-14), 160, 34, goal));
  t1.querySelector(".val").style.color = coreRoas != null && coreRoas >= goal ? "var(--st-good)" : (coreRoas != null && coreRoas < 1.5 ? "var(--st-crit)" : "inherit");
  tiles.appendChild(t1);
  tiles.appendChild(mk("Core spend — last 7 days", fmK(s.core_spend_l7),
    Math.round(s.core_spend_l7 / 7).toLocaleString("en-US", {style:"currency", currency:"USD", maximumFractionDigits:0}) + "/day", null));
  tiles.appendChild(mk("TOF / Demand Gen spend L7", fmK(s.tof_spend_l7),
    s.total_spend_l7 ? Math.round(s.tof_spend_l7 / s.total_spend_l7 * 100) + "% of total" : "", null));
  tiles.appendChild(mk("Brand spend L7", fmK(s.brand_spend_l7),
    s.total_spend_l7 ? Math.round(s.brand_spend_l7 / s.total_spend_l7 * 100) + "% of total" : "", null));
  tiles.appendChild(mk("Total spend L7", fmK(s.total_spend_l7), "all platforms, all buckets", null));
  app.appendChild(tiles);

  /* trend card */
  const tc = el("div", "card");
  tc.appendChild(el("h2", null, "30-day trend"));
  tc.appendChild(trendChart(days));
  app.appendChild(tc);

  /* channel summary */
  app.appendChild(channelSummary());

  /* insights */
  const ins = DATA.insights;
  const insWrap = el("div", "card");
  insWrap.appendChild(el("h2", null, "What's working / what needs attention"));
  const grid = el("div", "insights");
  const mkList = (title, items, actList) => {
    const d = el("div");
    d.appendChild(el("h2", null, title));
    const ul = el("ul");
    (items || []).forEach(it => {
      const li = el("li", "sev-" + (actList ? "act" : (it.sev || "info")));
      li.textContent = actList ? it : it.text;
      ul.appendChild(li);
    });
    if (!items || !items.length) ul.appendChild(el("li", "muted", "Nothing at current thresholds."));
    d.appendChild(ul);
    return d;
  };
  grid.appendChild(mkList("Working", ins.working));
  grid.appendChild(mkList("Needs attention", ins.issues));
  grid.appendChild(mkList("Next steps", ins.actions, true));
  insWrap.appendChild(grid);
  app.appendChild(insWrap);

  /* context + playbook */
  const cx = el("div", "card ctx");
  cx.appendChild(el("h2", null, "Context — what's in flight"));
  const cul = el("ul", "insights");
  (m.context || []).forEach(c => {
    const li = el("li");
    const dd = el("span", "d", c.date); li.appendChild(dd);
    li.appendChild(document.createTextNode(c.text));
    cul.appendChild(li);
  });
  cx.appendChild(cul);
  const det = el("details");
  det.appendChild(el("summary", null, "Playbook rules this dashboard applies"));
  const pul = el("ul");
  (m.playbook || []).forEach(p => { const li = el("li"); li.style.margin = "6px 0"; li.style.fontSize = "12.5px"; li.textContent = p; pul.appendChild(li); });
  det.appendChild(pul);
  cx.appendChild(det);
  app.appendChild(cx);

  /* tables card */
  const tcard = el("div", "card");
  tcard.appendChild(el("h2", null, "Performance detail"));
  const filters = el("div", "filters");
  const mkSeg = (options, cur, cb) => {
    const seg = el("div", "seg");
    options.forEach(([id, label]) => {
      const b = el("button", null, label);
      b.setAttribute("aria-pressed", String(id === cur));
      b.addEventListener("click", () => cb(id));
      seg.appendChild(b);
    });
    return seg;
  };
  filters.appendChild(mkSeg([["campaign", "Campaigns"], ["adset", "Ad sets"], ["ad", "Ads"]], levelSel,
    id => { levelSel = id; render(); }));
  filters.appendChild(mkSeg([["L1", "Yesterday"], ["L7", "Last 7"], ["L14", "Last 14"]], winSel,
    id => { winSel = id; render(); }));
  filters.appendChild(mkSeg([["all", "All"], ["meta", "Meta"], ["google", "Google"], ["tiktok", "TikTok"]], platSel,
    id => { platSel = id; render(); }));
  const se = el("input", "search"); se.placeholder = "Search name…"; se.value = query;
  se.addEventListener("input", () => { query = se.value; renderTable(twrap); });
  filters.appendChild(se);
  tcard.appendChild(filters);
  const note = el("div", "maturity-note");
  note.textContent = winSel === "L1"
    ? "Yesterday view: accrual revenue for yesterday is largely unmatured — use for spend/delivery checks, not ROAS judgments. Status badges always judge on the 7-day window."
    : "Status badges judge NB ROAS on the ≥7-day window with a $250 minimum spend. No kill/scale calls on <72h of data.";
  tcard.appendChild(note);
  const twrap = el("div"); twrap.style.overflowX = "auto";
  tcard.appendChild(twrap);
  renderTable(twrap);
  app.appendChild(tcard);

  /* footer */
  const f = el("footer");
  f.appendChild(el("div", null, "Definitions & data rules"));
  const ful = el("ul");
  (m.notes || []).forEach(nt => ful.appendChild(el("li", null, nt)));
  ful.appendChild(el("li", null, "Generated " + m.generated_at + " · Sources: Northbeam export API (attribution), Google Ads API (platform). Meta platform metrics land when the Meta connector is added."));
  f.appendChild(ful);
  app.appendChild(f);
}
</script>
