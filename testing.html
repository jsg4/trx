<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>TRX Testing — Lower Cross</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Geist:wght@400;500;650&display=swap" rel="stylesheet">
<style>
:root {
  /* ---- Lower Cross design tokens (v8) ------------------------------- */
  /* brand */
  --pine:#123524; --pine-2:#1B4A33; --lime:#DAFF00;
  --accent:#DAFF00; --on-accent:#123524;
  /* surfaces + ink (light: warm paper, white cards) */
  --page:#F5F3EE; --surface-1:#FFFFFF; --surface-2:#EFEDE6;
  --ink-1:#1A241E; --ink-2:#57635B; --ink-3:#7E8A81;
  --border:#E2E0D7; --grid:#EBE9E1; --axis:#B9B6AA;
  /* status — the ONLY red/amber/green on the page */
  --st-good:#177A46; --st-warn:#A96A00; --st-serious:#B45309; --st-crit:#BF3B31;
  --delta-good:#177A46; --delta-bad:#BF3B31;
  --wash:rgba(18,53,36,0.05);
  --wash-good:rgba(23,122,70,0.10); --wash-warn:rgba(169,106,0,0.11); --wash-bad:rgba(191,59,49,0.09);
  /* platform series (charts): harmonized, not neon */
  --s-meta:#33628F; --s-google:#B9862E; --s-tiktok:#3E8767; --s-other:#8A8FA0;
  --seq-250:#8FB2CF;
  /* bucket ramp (spend mix): tonal pine, one hue */
  --bk-core:#123524; --bk-tof:#4E7A5D; --bk-brand:#8FAC94; --bk-other:#CBC7B8;
  /* command bar (pine in both themes) */
  --bar-ink:#F4F6F1; --bar-ink-2:rgba(244,246,241,0.66); --bar-line:rgba(244,246,241,0.16);
  --bar-good:#6FD49A; --bar-warn:#E9B45B; --bar-crit:#F08D84;
  /* shape + elevation + spacing (8pt) */
  --r:14px; --r-s:8px;
  --shadow:0 1px 2px rgba(20,30,24,0.04), 0 8px 24px rgba(20,30,24,0.05);
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
  /* type roles */
  --f-display:"Space Grotesk",sans-serif;
  --f-ui:"Geist",-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  --t-cap:11px; --t-sm:12px; --t-body:13.5px; --t-title:18px; --t-kpi:30px;
}
:root[data-theme="dark"] {
  --page:#0D1411; --surface-1:#151D18; --surface-2:#1C2620;
  --ink-1:#ECEFEA; --ink-2:#A9B4AC; --ink-3:#79857D;
  --border:#28332B; --grid:#202B24; --axis:#4E5A51;
  --st-good:#4CC080; --st-warn:#D9A03C; --st-serious:#E08A3C; --st-crit:#E36B60;
  --delta-good:#4CC080; --delta-bad:#E36B60;
  --wash:rgba(218,255,0,0.05);
  --wash-good:rgba(76,192,128,0.13); --wash-warn:rgba(217,160,60,0.13); --wash-bad:rgba(227,107,96,0.13);
  --s-meta:#5D8DBC; --s-google:#CFA14E; --s-tiktok:#5CAB85; --s-other:#9BA0B0;
  --seq-250:#4F7DA8;
  --bk-core:#C7E463; --bk-tof:#79A886; --bk-brand:#48705A; --bk-other:#3A453D;
  --shadow:0 1px 2px rgba(0,0,0,0.4);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --page:#0D1411; --surface-1:#151D18; --surface-2:#1C2620;
    --ink-1:#ECEFEA; --ink-2:#A9B4AC; --ink-3:#79857D;
    --border:#28332B; --grid:#202B24; --axis:#4E5A51;
    --st-good:#4CC080; --st-warn:#D9A03C; --st-serious:#E08A3C; --st-crit:#E36B60;
    --delta-good:#4CC080; --delta-bad:#E36B60;
    --wash:rgba(218,255,0,0.05);
    --wash-good:rgba(76,192,128,0.13); --wash-warn:rgba(217,160,60,0.13); --wash-bad:rgba(227,107,96,0.13);
    --s-meta:#5D8DBC; --s-google:#CFA14E; --s-tiktok:#5CAB85; --s-other:#9BA0B0;
    --seq-250:#4F7DA8;
    --bk-core:#C7E463; --bk-tof:#79A886; --bk-brand:#48705A; --bk-other:#3A453D;
    --shadow:0 1px 2px rgba(0,0,0,0.4);
  }
}

/* ---- base ------------------------------------------------------------ */
* { box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { margin:0; background:var(--page); color:var(--ink-1); font:var(--t-body)/1.5 var(--f-ui); }
.wrap { max-width:1240px; margin:0 auto; padding:var(--s4) var(--s4) var(--s7); }
:focus-visible { outline:2px solid var(--pine); outline-offset:2px; border-radius:4px; }
:root[data-theme="dark"] :focus-visible { outline-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) :focus-visible { outline-color:var(--lime); } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition:none !important; animation:none !important; } }

h1 { font-family:var(--f-display); font-size:20px; margin:0; font-weight:700; letter-spacing:-0.02em; }
/* card section label — one label style everywhere */
h2 { font-family:var(--f-ui); font-size:var(--t-cap); margin:0 0 var(--s3); font-weight:650; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.08em; }
.sub { color:var(--ink-2); font-size:var(--t-sm); }
.muted { color:var(--ink-3); }

.card { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4) var(--s4); margin-bottom:var(--s4); box-shadow:var(--shadow); }

/* ---- command bar (signature: pine strip carries brand, nav, verdict) -- */
.cmdbar { background:var(--pine); color:var(--bar-ink); border-radius:var(--r); padding:var(--s3) var(--s4) 0; margin-bottom:var(--s4); box-shadow:var(--shadow); }
.cmdbar .brandrow { display:flex; align-items:baseline; gap:var(--s3); flex-wrap:wrap; }
.cmdbar .wordmark { font-family:var(--f-display); font-size:10px; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; color:var(--lime); }
.cmdbar h1 { color:var(--bar-ink); font-size:17px; }
.cmdbar .meta { display:flex; align-items:baseline; gap:var(--s2); flex-wrap:wrap; font-size:var(--t-sm); color:var(--bar-ink-2); }
.cmdbar .meta b { color:var(--bar-ink); font-weight:600; }
.cmdbar .meta .sep { opacity:0.4; }
.cmdbar .meta .stale { color:var(--bar-crit); font-weight:650; }
.cmdbar .spacer { flex:1; }
.cmdbar button.ghost { background:none; border:1px solid var(--bar-line); border-radius:var(--r-s); color:var(--bar-ink-2); padding:5px 12px; font:inherit; font-size:var(--t-sm); cursor:pointer; }
.cmdbar button.ghost:hover { color:var(--bar-ink); border-color:var(--bar-ink-2); }
.cmdbar :focus-visible { outline-color:var(--lime); }
/* nav tabs live inside the bar */
.pagenav { display:flex; gap:var(--s1); margin-top:var(--s2); overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.pagenav a { padding:10px 14px 12px; font-family:var(--f-ui); font-size:13px; font-weight:500; color:var(--bar-ink-2); text-decoration:none; border-bottom:2px solid transparent; white-space:nowrap; }
.pagenav a:hover { color:var(--bar-ink); }
.pagenav a.on { color:var(--lime); border-bottom-color:var(--lime); font-weight:650; }
/* verdict strip — cockpit only, bottom row of the bar */
.verdict { display:flex; align-items:baseline; gap:var(--s2); border-top:1px solid var(--bar-line); padding:var(--s3) 0; margin:var(--s2) 0 0; font-size:var(--t-body); color:var(--bar-ink); flex-wrap:wrap; }
.verdict .vdot { width:9px; height:9px; border-radius:50%; flex:none; align-self:center; }
.verdict.v-good .vdot { background:var(--bar-good); }
.verdict.v-warn .vdot { background:var(--bar-warn); }
.verdict.v-bad .vdot { background:var(--bar-crit); }
.verdict .vh { font-weight:650; }
.verdict.v-bad .vh { color:var(--bar-crit); }
.verdict.v-warn .vh { color:var(--bar-warn); }
.verdict.v-good .vh { color:var(--bar-good); }
.verdict .vs { color:var(--bar-ink-2); }
.verdict .vs b { color:var(--bar-ink); font-weight:600; }
.verdict a { color:var(--lime); text-decoration:none; font-weight:600; }
.verdict a:hover { text-decoration:underline; }

/* page title under the bar */
.pagehead { margin:var(--s5) 0 var(--s3); }
.pagehead .ptitle { font-family:var(--f-display); font-size:var(--t-title); font-weight:700; letter-spacing:-0.02em; }

/* legacy header pieces (lock screen wordmark) */
.wordmark { font-family:var(--f-display); font-size:10px; letter-spacing:0.22em; color:var(--ink-3); text-transform:uppercase; font-weight:700; }
.chip { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border:1px solid var(--border); border-radius:100px; font-size:var(--t-sm); color:var(--ink-2); background:var(--surface-1); }
.chip b { color:var(--ink-1); }
button.ghost { background:none; border:1px solid var(--border); border-radius:var(--r-s); color:var(--ink-2); padding:6px 12px; font:inherit; font-size:var(--t-sm); cursor:pointer; }
button.ghost:hover { color:var(--ink-1); }

/* ---- decide queues ---------------------------------------------------- */
.decide { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s3); }
.dcol { border:1px solid var(--border); border-top:2px solid var(--border); border-radius:var(--r-s); padding:var(--s3) var(--s4); background:var(--surface-1); }
.dcol h3 { margin:0 0 var(--s2); font-size:var(--t-cap); letter-spacing:0.08em; display:flex; align-items:center; gap:6px; text-transform:uppercase; font-weight:650; }
.dcol h3 .dot { width:8px; height:8px; border-radius:50%; }
.d-now { border-top-color:var(--st-crit); } .d-now h3 { color:var(--st-crit); } .d-now .dot { background:var(--st-crit); }
.d-scale { border-top-color:var(--st-good); } .d-scale h3 { color:var(--st-good); } .d-scale .dot { background:var(--st-good); }
.d-watch { border-top-color:var(--st-warn); } .d-watch h3 { color:var(--st-warn); } .d-watch .dot { background:var(--st-warn); }
.ditem { padding:var(--s2) 0 10px; border-top:1px solid var(--grid); font-size:13px; }
.ditem:first-of-type { border-top:none; }
.ditem .w { font-weight:400; color:var(--ink-2); }
.ditem .w .qname { font-weight:650; color:var(--ink-1); }
.ditem .a { color:var(--ink-2); margin-top:3px; font-size:var(--t-sm); }
.ditem .a::before { content:"→ "; color:var(--ink-3); }
.dempty { color:var(--ink-3); font-size:13px; padding:var(--s2) 0; }
.dkids { margin-top:6px; border-left:2px solid var(--grid); padding-left:10px; }
.dkid { display:flex; align-items:baseline; gap:6px; font-size:var(--t-sm); color:var(--ink-2); padding:2px 0; }
.dkid .kdot { width:6px; height:6px; border-radius:50%; flex:none; align-self:center; }
.dkid.k-pause .kdot { background:var(--st-crit); }
.dkid.k-keep .kdot { background:var(--st-good); }
.dkid.k-best .kdot { background:var(--st-warn); }
.dkid .knm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%; }
.dkid .kv { margin-left:auto; font-variant-numeric:tabular-nums; white-space:nowrap; color:var(--ink-1); }

/* ---- stat tiles: one anatomy — label / value / delta chip ------------- */
.tiles { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px,1fr)); gap:var(--s3); margin-bottom:var(--s4); }
.tile { position:relative; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4); box-shadow:var(--shadow); }
.tile .lbl { font-size:var(--t-cap); color:var(--ink-3); margin-bottom:var(--s2); text-transform:uppercase; letter-spacing:0.08em; font-weight:650; line-height:1.45; min-height:calc(2 * 1.45em); }
.tile .val { font-family:var(--f-display); font-size:var(--t-kpi); font-weight:700; letter-spacing:-0.02em; line-height:1.1; font-variant-numeric:tabular-nums; }
.tile .delta { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:100px; font-weight:600; margin-top:var(--s2); font-size:var(--t-sm); background:var(--surface-2); color:var(--ink-2); }
.tile .delta.up { background:var(--wash-good); color:var(--delta-good); }
.tile .delta.down { background:var(--wash-bad); color:var(--delta-bad); }
.tile .basis { font-size:var(--t-sm); color:var(--ink-3); margin-top:var(--s1); }
.tile svg { display:block; margin-top:var(--s2); }
.sdot { display:none; }
.goalbar { position:relative; height:4px; border-radius:100px; background:var(--grid); margin-top:var(--s2); overflow:visible; }
.goalbar > i { display:block; height:100%; border-radius:100px; }
.goalbar .tick { position:absolute; top:-3px; width:2px; height:10px; background:var(--axis); }

/* ---- routine ---------------------------------------------------------- */
.routine { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s4); }
.routine ol { margin:6px 0 0; padding-left:20px; font-size:13px; color:var(--ink-2); }
.routine li { margin:4px 0; }
.routine b { color:var(--ink-1); }

/* ---- charts ------------------------------------------------------------ */
.chartbox { position:relative; }
.crosshair { position:absolute; top:0; width:1px; background:var(--axis); pointer-events:none; display:none; }
.tooltip { position:absolute; pointer-events:none; display:none; z-index:5; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r-s); padding:var(--s2) 10px; font-size:var(--t-sm); box-shadow:var(--shadow); min-width:150px; }
.tooltip .tt-date { color:var(--ink-3); margin-bottom:4px; }
.tooltip .row { display:flex; align-items:center; gap:6px; margin:2px 0; }
.tooltip .key { width:12px; height:2px; border-radius:1px; flex:none; }
.tooltip .v { font-weight:650; margin-left:auto; padding-left:12px; font-variant-numeric:tabular-nums; }
.legend { display:flex; gap:14px; flex-wrap:wrap; font-size:var(--t-sm); color:var(--ink-2); margin-top:var(--s2); }
.legend .key { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px; }
.legend .keyline { display:inline-block; width:14px; height:2px; border-radius:1px; margin-right:5px; vertical-align:3px; }
.legend .keyline.thick { height:3px; }

/* ---- tables ------------------------------------------------------------ */
table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { text-align:right; padding:9px 10px; border-bottom:1px solid var(--grid); white-space:nowrap; }
th:first-child, td:first-child { text-align:left; }
th { color:var(--ink-3); font-weight:500; font-size:var(--t-cap); text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--surface-1); z-index:1; }
th.sorted { color:var(--ink-1); font-weight:650; }
td { font-variant-numeric:tabular-nums; }
td.name { max-width:340px; overflow:hidden; text-overflow:ellipsis; text-align:left; }
td .pdot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
tr:hover td { background:var(--wash); }
td.num { font-variant-numeric:tabular-nums; }
td.guide { text-align:left; color:var(--ink-2); font-size:var(--t-sm); white-space:normal; min-width:150px; }
.badge { display:inline-flex; align-items:center; gap:5px; font-size:var(--t-cap); padding:2px 8px; border-radius:100px; border:1px solid var(--border); color:var(--ink-2); font-weight:600; }
.badge .dot { width:6px; height:6px; border-radius:50%; }
.b-scale { color:var(--st-good); border-color:var(--st-good); } .b-scale .dot { background:var(--st-good); }
.b-goal .dot { background:var(--st-good); }
.b-watch .dot { background:var(--st-warn); }
.b-fix { color:var(--st-crit); border-color:var(--st-crit); } .b-fix .dot { background:var(--st-crit); }
.b-na .dot { background:var(--ink-3); }
.roascell { font-weight:650; }
.tscroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }

/* ---- section divider --------------------------------------------------- */
.section-h { display:flex; align-items:baseline; gap:10px; margin:var(--s6) 0 var(--s3); }
.section-h h2 { font-family:var(--f-display); font-size:15px; margin:0; letter-spacing:-0.01em; color:var(--ink-1); text-transform:none; font-weight:700; }
.section-h .sub { font-size:var(--t-sm); }

/* ---- insights lists ----------------------------------------------------- */
.insights { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s3); }
.insights ul, ul.insights { margin:0; padding-left:0; list-style:none; }
.insights li, ul.insights li { padding:9px 0 9px 20px; position:relative; border-bottom:1px solid var(--grid); font-size:13px; }
.insights li:last-child, ul.insights li:last-child { border-bottom:none; }
.insights li::before, ul.insights li::before { content:""; position:absolute; left:2px; top:14px; width:7px; height:7px; border-radius:50%; }
li.sev-good::before { background:var(--st-good); }
li.sev-warn::before { background:var(--st-warn); }
li.sev-bad::before { background:var(--st-crit); }
li.sev-info::before { background:var(--ink-3); }
.ctx li::before { background:var(--ink-3); }
.ctx .d { color:var(--ink-3); font-size:var(--t-cap); margin-right:6px; }
details summary { cursor:pointer; color:var(--ink-2); font-size:13px; font-weight:600; padding:4px 0; }
footer { color:var(--ink-3); font-size:var(--t-sm); margin-top:var(--s5); }
footer li { margin:3px 0; }

/* ---- widgets ------------------------------------------------------------ */
.wrow { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:var(--s3); margin-bottom:var(--s4); }
.widget { background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4); box-shadow:var(--shadow); }
.widget h3 { margin:0 0 var(--s3); font-family:var(--f-ui); font-size:var(--t-cap); letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-3); font-weight:650; }
.mixbar { display:flex; height:10px; border-radius:6px; overflow:hidden; gap:2px; background:var(--grid); }
.mixbar > div { height:100%; }
.mixlegend { margin-top:var(--s3); }
.mixlegend .row { display:flex; align-items:center; gap:8px; font-size:var(--t-sm); padding:3px 0; color:var(--ink-2); }
.mixlegend .sw { width:9px; height:9px; border-radius:3px; flex:none; }
.mixlegend .v { margin-left:auto; font-variant-numeric:tabular-nums; color:var(--ink-1); font-weight:600; }
/* goal track: 30 daily bars vs goal */
.gtrack { display:flex; align-items:flex-end; gap:2px; height:44px; margin-top:var(--s1); }
.gtrack i { flex:1; min-width:2px; border-radius:2px 2px 0 0; background:var(--grid); }
.gtrack i.above { background:var(--st-good); }
.gtrack i.below { background:var(--wash-bad); background:color-mix(in srgb, var(--st-crit) 45%, transparent); }
.gtrack-cap { font-size:var(--t-sm); color:var(--ink-2); margin-top:var(--s2); }
.gtrack-cap b { color:var(--ink-1); font-variant-numeric:tabular-nums; }
.callout { display:flex; gap:9px; padding:var(--s2) 0; border-bottom:1px solid var(--grid); font-size:13px; align-items:baseline; }
.callout:last-child { border-bottom:none; }
.callout .cdot { width:7px; height:7px; border-radius:50%; flex:none; align-self:center; }
.mult-chip { display:inline-block; padding:1px 8px; border-radius:100px; font-weight:650; font-size:var(--t-sm); background:var(--surface-2); font-variant-numeric:tabular-nums; }

/* ---- takeaways ----------------------------------------------------------- */
.takeaway { display:flex; gap:8px; align-items:baseline; font-size:13px; font-weight:600; color:var(--ink-1); margin:0 0 var(--s3); }
.takeaway::before { content:""; width:7px; height:7px; border-radius:50%; flex:none; align-self:center; background:var(--ink-3); }
.takeaway.tk-good::before { background:var(--st-good); }
.takeaway.tk-warn::before { background:var(--st-warn); }
.takeaway.tk-bad::before { background:var(--st-crit); }
.roasbar { display:inline-block; width:44px; height:4px; border-radius:100px; background:var(--grid); margin-left:7px; vertical-align:2px; overflow:hidden; }
.roasbar > i { display:block; height:100%; border-radius:100px; }

/* ---- cockpit nav cards ----------------------------------------------------- */
.navcards { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:var(--s3); margin-bottom:var(--s4); }
.ncard { display:block; background:var(--surface-1); border:1px solid var(--border); border-radius:var(--r); padding:var(--s4); text-decoration:none; color:var(--ink-1); transition:border-color .15s; box-shadow:var(--shadow); }
.ncard:hover { border-color:var(--pine); }
:root[data-theme="dark"] .ncard:hover { border-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .ncard:hover { border-color:var(--lime); } }
.nc-title { font-family:var(--f-display); font-weight:700; font-size:13.5px; letter-spacing:-0.01em; }
.nc-teaser { color:var(--ink-3); font-size:var(--t-sm); margin-top:var(--s1); }
.morelink { display:block; margin-top:var(--s2); font-size:var(--t-sm); font-weight:650; color:inherit; }

/* ---- testing monitor ----------------------------------------------------- */
.tchip { display:inline-flex; align-items:center; gap:5px; font-size:var(--t-cap); padding:2px 9px; border-radius:100px; border:1px solid var(--border); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; white-space:nowrap; }
.tchip .dot { width:6px; height:6px; border-radius:50%; }
.t-graduate { color:var(--st-good); border-color:var(--st-good); } .t-graduate .dot { background:var(--st-good); }
.t-kill { color:var(--st-crit); border-color:var(--st-crit); } .t-kill .dot { background:var(--st-crit); }
.t-final_stretch { color:var(--st-warn); } .t-final_stretch .dot { background:var(--st-warn); }
.t-early_signal { color:var(--st-good); } .t-early_signal .dot { background:var(--st-good); }
.t-in_test { color:var(--ink-2); } .t-in_test .dot { background:var(--ink-3); }
.meter { width:120px; height:6px; border-radius:100px; background:var(--grid); overflow:hidden; }
.meter > div { height:100%; border-radius:100px; }
td.action { text-align:left; white-space:normal; min-width:220px; max-width:330px; color:var(--ink-2); font-size:var(--t-sm); }

/* ---- creative intelligence ----------------------------------------------- */
.vchip { display:inline-flex; align-items:center; gap:4px; font-size:var(--t-cap); padding:1px 8px; border-radius:100px; border:1px solid var(--border); font-weight:650; text-transform:uppercase; letter-spacing:0.06em; }
.vchip.lean_in { color:var(--st-good); border-color:var(--st-good); }
.vchip.cut { color:var(--st-crit); border-color:var(--st-crit); }
.vchip.iterate { color:var(--ink-2); }
.vchip.low_data { color:var(--ink-3); }
.ci-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s4); }
.ci-lists { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s3); margin-top:var(--s4); }
.comp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:var(--s3); }
.comp-card { border:1px solid var(--border); border-radius:var(--r-s); padding:var(--s3) var(--s4); }
.comp-card h4 { margin:0 0 2px; font-family:var(--f-display); font-size:14px; }
.comp-card .cat { color:var(--ink-3); font-size:var(--t-cap); margin-bottom:6px; }
.comp-card .angles { display:flex; flex-wrap:wrap; gap:4px; margin:6px 0; }
.comp-card .angles span { font-size:var(--t-cap); border:1px solid var(--border); border-radius:100px; padding:1px 8px; color:var(--ink-2); }
.comp-card .mirror { font-size:var(--t-sm); color:var(--ink-1); margin-top:6px; }
.comp-card .mirror::before { content:"Mirror: "; font-weight:650; color:var(--ink-2); }
.comp-thumbs { display:flex; gap:6px; margin-top:var(--s2); }
.comp-thumbs img { height:74px; border-radius:6px; border:1px solid var(--border); object-fit:cover; }
.comp-proven { font-size:var(--t-cap); color:var(--ink-3); margin-top:4px; }
.gapbox { border:1px solid var(--border); border-left:3px solid var(--pine); border-radius:var(--r-s); padding:var(--s3) var(--s4); margin-top:var(--s4); }
:root[data-theme="dark"] .gapbox { border-left-color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .gapbox { border-left-color:var(--lime); } }
.gapbox ul { margin:4px 0 0; padding-left:18px; font-size:13px; color:var(--ink-2); }
.gapbox li { margin:5px 0; }
.creative { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:var(--s4); }

/* ---- filters ------------------------------------------------------------- */
.filters { display:flex; flex-wrap:wrap; gap:var(--s2); align-items:center; margin-bottom:var(--s3); }
.seg { display:inline-flex; border:1px solid var(--border); border-radius:var(--r-s); overflow:hidden; background:var(--surface-1); }
.seg button { background:none; border:none; padding:7px 14px; font:inherit; font-size:13px; color:var(--ink-2); cursor:pointer; border-right:1px solid var(--border); }
.seg button:last-child { border-right:none; }
.seg button[aria-pressed="true"] { color:var(--ink-1); font-weight:650; background:var(--surface-2); }
input.search { background:var(--surface-1); color:var(--ink-1); border:1px solid var(--border); border-radius:var(--r-s); padding:7px 12px; font:inherit; font-size:13px; width:220px; }
.maturity-note { font-size:var(--t-sm); color:var(--ink-3); margin-top:var(--s1); }

/* ---- unlock ---------------------------------------------------------------- */
#lock { max-width:360px; width:calc(100% - 32px); margin:18vh auto; text-align:center; }
#lock .wordmark { color:var(--pine); }
:root[data-theme="dark"] #lock .wordmark { color:var(--lime); }
@media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) #lock .wordmark { color:var(--lime); } }
#lock input { width:100%; padding:10px 12px; font:inherit; border:1px solid var(--border); border-radius:var(--r-s); background:var(--surface-1); color:var(--ink-1); margin:var(--s4) 0 10px; }
#lock button { width:100%; padding:11px; font:inherit; font-weight:650; border:none; border-radius:var(--r-s); background:var(--pine); color:var(--lime); cursor:pointer; }
#lock .err { color:var(--st-crit); font-size:13px; min-height:18px; }
#app { display:none; }

/* ---- mobile ------------------------------------------------------------------ */
@media (max-width:720px){
  .wrap { padding:var(--s3) max(12px, env(safe-area-inset-right)) var(--s7) max(12px, env(safe-area-inset-left)); }
  input.search, #lock input { font-size:16px; }
  .card { padding:var(--s3); border-radius:var(--r-s); }
  .cmdbar { padding:var(--s3) var(--s3) 0; border-radius:var(--r-s); }
  .cmdbar h1 { font-size:15px; }
  .cmdbar .meta { font-size:var(--t-cap); }
  /* attribution detail lives on the Reference page; keep the bar one line on phones */
  .cmdbar .meta .attr, .cmdbar .meta .sep { display:none; }
  .cmdbar .meta { gap:2px 12px; }
  .pagenav a { padding:8px 10px 10px; font-size:var(--t-sm); }
  .pagehead { margin:var(--s4) 0 var(--s2); }
  .tiles { grid-template-columns:repeat(2, 1fr); gap:var(--s2); }
  .tile { padding:var(--s3); }
  .tile .val { font-size:22px; }
  .tile svg { max-width:100%; }
  td.name { max-width:160px; }
  th, td { padding:8px 8px; font-size:var(--t-sm); }
  .seg button { padding:6px 10px; }
  .tscroll th:first-child, .tscroll td:first-child { position:sticky; left:0; background:var(--surface-1); z-index:2; }
  .tscroll tr:hover td { background:var(--surface-1); }
  .insights { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div id="lock" class="card">
  <div class="wordmark" style="text-align:center">Lower Cross</div>
  <div id="lockform">
    <h1>TRX Dashboard</h1>
    <p class="sub">Enter the team passphrase to unlock.</p>
    <input id="pw" type="password" placeholder="Passphrase" autocomplete="current-password">
    <div class="err" id="pwerr"></div>
    <button id="unlock">Unlock</button>
  </div>
  <div id="lockload" style="display:none">
    <h1>TRX Dashboard</h1>
    <p class="sub">Unlocking…</p>
  </div>
</div>
<script>
// saved-pass sessions show a loading state, never a password-form flash
if (localStorage.getItem("mp_pass")) {
  document.getElementById("lockform").style.display = "none";
  document.getElementById("lockload").style.display = "block";
}
</script>

<div id="app" class="wrap"></div>

<script>
"use strict";
/* ---------- crypto ---------- */
async function deriveKey(pass, salt, iter) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:iter, hash:"SHA-256"}, km,
    {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decryptEnvelope(env, pass) {
  const key = await deriveKey(pass, b64(env.salt), env.iter);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(env.iv)}, key, b64(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* ---------- state ---------- */
let DATA = null;
const PAGE = "testing";
let winSel = "L7", platSel = PAGE === "creative" ? "meta" : "all",
    levelSel = PAGE === "creative" ? "ad" : "campaign";
let sortCol = "spend", sortDir = -1, query = "", showZero = false, minRoasOn = false;
const ROAS_FILTER = 1.75;  // testing graduation bar — "working" threshold
const PLAT_COLOR = { meta:"var(--s-meta)", google:"var(--s-google)", tiktok:"var(--s-tiktok)" };
const PLAT_LABEL = { meta:"Meta", google:"Google", tiktok:"TikTok" };
const fm$ = v => "$" + Math.round(v).toLocaleString("en-US");
const fmK = v => v >= 10000 ? "$" + (v/1000).toFixed(0) + "K" : fm$(v);
const fmR = v => v == null ? "–" : v.toFixed(2);
function el(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

/* ---------- boot ---------- */
async function tryUnlock(pass) {
  const res = await fetch("data.enc", {cache:"no-store"});
  if (!res.ok) throw new Error("data.enc not found");
  DATA = await decryptEnvelope(JSON.parse(await res.text()), pass);
}
document.getElementById("unlock").addEventListener("click", go);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") go(); });
async function go() {
  const pass = document.getElementById("pw").value.trim();
  if (!pass) return;
  try {
    await tryUnlock(pass);
    localStorage.setItem("mp_pass", pass);
    document.getElementById("lock").style.display = "none";
    document.getElementById("app").style.display = "block";
    render();
  } catch (e) {
    document.getElementById("pwerr").textContent = "Wrong passphrase (or data missing).";
  }
}
let lastW = window.innerWidth;
window.addEventListener("resize", () => {
  if (!DATA || Math.abs(window.innerWidth - lastW) < 40) return;
  lastW = window.innerWidth;
  render();
});
(async () => {
  const saved = localStorage.getItem("mp_pass");
  if (saved) {
    try {
      await tryUnlock(saved);
      document.getElementById("lock").style.display = "none";
      document.getElementById("app").style.display = "block";
      render();
    } catch (e) {
      localStorage.removeItem("mp_pass");
      // reveal the form only when the saved pass genuinely fails
      document.getElementById("lockload").style.display = "none";
      document.getElementById("lockform").style.display = "block";
    }
  }
})();

/* ---------- derived series ---------- */
function dailySeries() {
  const by = {};
  for (const c of DATA.levels.campaign) {
    for (const d of c.daily) {
      const o = by[d.date] || (by[d.date] = {meta:0, google:0, tiktok:0, coreSpend:0, coreRev:0});
      if (o[c.platform] != null) o[c.platform] += d.spend || 0;
      if (c.bucket === "core") { o.coreSpend += d.spend || 0; o.coreRev += d.rev7 || 0; }
    }
  }
  const days = Object.keys(by).sort().map(date => ({date, ...by[date],
    roas: by[date].coreSpend > 0 ? by[date].coreRev / by[date].coreSpend : null}));
  // spend-weighted 7-day rolling core ROAS — the line a buyer should read
  for (let i = 0; i < days.length; i++) {
    let s = 0, r = 0;
    for (let j = Math.max(0, i - 6); j <= i; j++) { s += days[j].coreSpend; r += days[j].coreRev; }
    days[i].roll = i >= 6 && s > 0 ? r / s : null;
  }
  return days;
}

/* ---------- svg helpers ---------- */
const SVG = "http://www.w3.org/2000/svg";
function sv(tag, attrs) {
  const n = document.createElementNS(SVG, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}
function sparkline(vals, w, h, goal) {
  const svg = sv("svg", {width:w, height:h, viewBox:`0 0 ${w} ${h}`});
  const nums = vals.filter(v => v != null);
  if (nums.length < 2) return svg;
  const max = Math.max(...nums, goal || 0) * 1.1 || 1;
  const pts = vals.map((v, i) => v == null ? null :
    [i / (vals.length - 1) * (w - 6) + 3, h - 3 - v / max * (h - 8)]);
  if (goal != null) {
    const gy = h - 3 - goal / max * (h - 8);
    svg.appendChild(sv("line", {x1:0, x2:w, y1:gy, y2:gy, stroke:"var(--axis)", "stroke-width":1, "stroke-dasharray":"3,3"}));
  }
  let d = "", st = false;
  pts.forEach(p => { if (!p) { st = false; return; }
    d += (st ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1); st = true; });
  svg.appendChild(sv("path", {d, fill:"none", stroke:"var(--seq-250)", "stroke-width":2, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  const last = [...pts].reverse().find(p => p);
  if (last) svg.appendChild(sv("circle", {cx:last[0], cy:last[1], r:4, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
  return svg;
}

/* ---------- main trend chart ---------- */
function trendChart(days) {
  const box = el("div", "chartbox");
  const appW = document.getElementById("app").clientWidth || 1000;
  const W = Math.min(1180, Math.max(300, appW - 40));
  const narrow = W < 520;
  const H1 = narrow ? 130 : 160, H2 = narrow ? 100 : 130, GAP = 26,
        padL = narrow ? 34 : 44, padR = narrow ? 8 : 14, AXH = 20;
  const H = H1 + GAP + H2 + AXH;
  const svg = sv("svg", {width:"100%", height:H, viewBox:`0 0 ${W} ${H}`, style:"display:block"});
  const n = days.length;
  const x = i => padL + (n === 1 ? 0 : i / (n - 1) * (W - padL - padR));
  const goal = DATA.meta.goal_roas;

  /* panel 1: daily (light) + rolling (bold) core ROAS */
  const allVals = days.flatMap(d => [d.roas, d.roll]).filter(v => v != null);
  const rmax = Math.max(goal * 1.3, ...allVals) * 1.08;
  const ry = v => H1 - 8 - (v / rmax) * (H1 - 22);
  [0, goal].forEach(v => {
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(v), y2:ry(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:ry(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = v.toFixed(1); svg.appendChild(t);
  });
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:ry(goal), y2:ry(goal), stroke:"var(--axis)", "stroke-width":1.5, "stroke-dasharray":"5,4"}));
  const gt = sv("text", {x:W - padR, y:ry(goal) - 5, "text-anchor":"end", fill:"var(--ink-2)", "font-size":10.5, "font-weight":600});
  gt.textContent = "goal " + goal.toFixed(1); svg.appendChild(gt);
  if (n > 7) {
    svg.appendChild(sv("rect", {x:x(n - 7), y:8, width:x(n - 1) - x(n - 7), height:H1 - 16, fill:"var(--wash)"}));
  }
  const path = (get, stroke, width) => {
    let d = "", st = false;
    days.forEach((dd, i) => { const v = get(dd); if (v == null) { st = false; return; }
      d += (st ? "L" : "M") + x(i).toFixed(1) + "," + ry(v).toFixed(1); st = true; });
    svg.appendChild(sv("path", {d, fill:"none", stroke, "stroke-width":width, "stroke-linecap":"round", "stroke-linejoin":"round"}));
  };
  path(d => d.roas, "var(--seq-250)", 1.5);
  path(d => d.roll, "var(--s-meta)", 2.5);
  const lastRollIdx = (() => { for (let i = n - 1; i >= 0; i--) if (days[i].roll != null) return i; return -1; })();
  if (lastRollIdx >= 0) {
    const v = days[lastRollIdx].roll;
    svg.appendChild(sv("circle", {cx:x(lastRollIdx), cy:ry(v), r:4.5, fill:"var(--s-meta)", stroke:"var(--surface-1)", "stroke-width":2}));
    const vt = sv("text", {x:x(lastRollIdx) - 8, y:ry(v) - 9, "text-anchor":"end", fill:"var(--ink-1)", "font-size":11.5, "font-weight":650});
    vt.textContent = v.toFixed(2); svg.appendChild(vt);
  }
  const p1t = sv("text", {x:padL, y:14, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p1t.textContent = narrow ? "Core NB ROAS" : "Core NB ROAS by day — read the bold 7-day line, not the daily wiggle";
  svg.appendChild(p1t);

  /* panel 2: stacked spend bars by channel */
  const top2 = H1 + GAP;
  const smax = Math.max(...days.map(d => d.meta + d.google + d.tiktok)) * 1.12 || 1;
  const sy = v => top2 + (H2 - 14) - (v / smax) * (H2 - 26);
  [Math.round(smax / 2000) * 1000].filter(v => v > 0).forEach(v => {
    svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(v), y2:sy(v), stroke:"var(--grid)", "stroke-width":1}));
    const t = sv("text", {x:padL - 6, y:sy(v) + 4, "text-anchor":"end", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = "$" + (v / 1000) + "K"; svg.appendChild(t);
  });
  const bw = Math.min(24, Math.max(3, (W - padL - padR) / n - 2));
  const order = ["meta", "google", "tiktok"];
  days.forEach((d, i) => {
    let acc = 0;
    order.forEach(p => {
      const v = d[p]; if (!v) return;
      const y1 = sy(acc + v), y0 = sy(acc);
      svg.appendChild(sv("rect", {x:x(i) - bw / 2, y:y1 + (acc ? 1 : 0), width:bw,
        height:Math.max(0, y0 - y1 - 1), rx:3, fill:`var(--s-${p})`}));
      acc += v;
    });
  });
  svg.appendChild(sv("line", {x1:padL, x2:W - padR, y1:sy(0), y2:sy(0), stroke:"var(--axis)", "stroke-width":1}));
  const p2t = sv("text", {x:padL, y:top2 + 4, fill:"var(--ink-2)", "font-size":11, "font-weight":600});
  p2t.textContent = narrow ? "Daily spend (all buckets)" : "Daily spend by channel — all buckets (core + TOF + brand + support)";
  svg.appendChild(p2t);

  const step = Math.ceil(n / (narrow ? 5 : 8));
  days.forEach((d, i) => {
    if (i % step !== 0 && i !== n - 1) return;
    if (i !== n - 1 && x(n - 1) - x(i) < 34) return;
    const t = sv("text", {x:x(i), y:H - 4, "text-anchor":"middle", fill:"var(--ink-3)", "font-size":10.5});
    t.textContent = d.date.slice(5).replace("-", "/"); svg.appendChild(t);
  });

  box.appendChild(svg);
  const leg = el("div", "legend");
  const mkKey = (cls, color, label) => {
    const s = el("span"); const k = el("span", cls); k.style.background = color;
    s.appendChild(k); s.appendChild(document.createTextNode(label)); return s;
  };
  leg.appendChild(mkKey("keyline thick", "var(--s-meta)", "7-day rolling ROAS"));
  leg.appendChild(mkKey("keyline", "var(--seq-250)", "Daily ROAS"));
  order.forEach(p => leg.appendChild(mkKey("key", `var(--s-${p})`, PLAT_LABEL[p] + " spend")));
  const mw = el("span", "muted"); mw.textContent = "shaded = accrual still maturing"; leg.appendChild(mw);
  box.appendChild(leg);

  /* crosshair + tooltip */
  const ch = el("div", "crosshair"); ch.style.height = (H - AXH) + "px"; box.appendChild(ch);
  const tt = el("div", "tooltip"); box.appendChild(tt);
  svg.addEventListener("pointermove", ev => {
    const rect = svg.getBoundingClientRect();
    const scale = W / rect.width;
    const px = (ev.clientX - rect.left) * scale;
    let best = 0, bd = 1e9;
    for (let i = 0; i < n; i++) { const dd = Math.abs(x(i) - px); if (dd < bd) { bd = dd; best = i; } }
    const d = days[best];
    ch.style.left = (x(best) / scale) + "px"; ch.style.display = "block";
    tt.replaceChildren();
    tt.appendChild(el("div", "tt-date", d.date));
    const addRow = (color, label, val, line) => {
      const r = el("div", "row");
      const k = el("span", "key"); k.style.background = color; if (!line) { k.style.height = "8px"; k.style.borderRadius = "2px"; }
      r.appendChild(k); r.appendChild(el("span", null, label)); r.appendChild(el("span", "v", val));
      tt.appendChild(r);
    };
    addRow("var(--s-meta)", "7d rolling", d.roll == null ? "–" : d.roll.toFixed(2), true);
    addRow("var(--seq-250)", "Daily ROAS", d.roas == null ? "–" : d.roas.toFixed(2), true);
    order.forEach(p => addRow(`var(--s-${p})`, PLAT_LABEL[p], fm$(d[p] || 0)));
    addRow("var(--axis)", "Total spend", fm$(d.meta + d.google + d.tiktok));
    tt.style.display = "block";
    const ttw = tt.offsetWidth;
    const lx = x(best) / scale;
    tt.style.left = Math.min(Math.max(lx + 12, 0), rect.width - ttw - 4) + "px";
    tt.style.top = "30px";
    if (lx + 12 + ttw > rect.width) tt.style.left = (lx - ttw - 12) + "px";
  });
  svg.addEventListener("pointerleave", () => { ch.style.display = "none"; tt.style.display = "none"; });
  return box;
}

/* ---------- tables (shared with v1) ---------- */
function statusBadge(e) {
  const goal = DATA.meta.goal_roas;
  if (e.platform === "tiktok") return ["b-na", "TikTok — NB broken"];
  if (e.bucket === "tof") return ["b-na", "TOF"];
  if (e.bucket === "brand") return ["b-na", "Brand"];
  if (e.bucket === "other") return ["b-na", "App / Amazon"];
  if (/zombie/i.test(e.campaign_name || "")) return ["b-na", "Zombie pen"];
  const w = e.windows[winSel === "L1" ? "L7" : winSel];
  if (!w || (w.spend || 0) < 250 || w.roas7 == null) return ["b-na", "Low data"];
  if (w.roas7 >= goal * 1.2) return ["b-scale", "Scale ↑"];
  if (w.roas7 >= goal) return ["b-goal", "On goal"];
  if (w.roas7 >= 1.5) return ["b-watch", "Watch"];
  return ["b-fix", "Fix / cut"];
}
function entityName(e) {
  if (levelSel === "campaign") return e.campaign_name || e.campaign_id;
  if (levelSel === "adset") return (e.adset_name || e.adset_id);

function renderTable(container) {
  container.replaceChildren();

  let rows = DATA.levels[levelSel].filter(e => e.bucket !== "other")

  if (query) {
    const q = query.toLowerCase();
    rows = rows.filter(e => (entityName(e) + " " + entitySub(e)).toLowerCase().includes(q));
  }
  const W = winSel;
  const preZero = rows.length;
  if (!showZero) rows = rows.filter(e => (e.windows[W].spend || 0) > 0);
  const zeroHidden = preZero - rows.length;
  // threshold judges on the >=7d window even in the Yesterday view (L1 accrual
  // is too immature to threshold on), same mapping the status badges use
  const preRoas = rows.length;
  if (minRoasOn) rows = rows.filter(e => {
    const w = e.windows[W === "L1" ? "L7" : W];
    return w && w.roas7 != null && w.roas7 >= ROAS_FILTER;
  });
  const roasHidden = preRoas - rows.length;
  const get = {
    name: e => entityName(e).toLowerCase(),
    spend: e => e.windows[W].spend || 0,
    roas: e => e.windows[W].roas7 ?? -1,
    rev: e => e.windows[W].rev7 || 0,
    txns: e => e.windows[W].txns || 0,
    proas: e => e.windows[W].p_roas ?? -1,
    hook: e => {
      const w = e.windows[W];
      const isVideo = !/static|image|carousel/i.test(e.ad_name || "");
      return isVideo && (w.impressions || 0) >= 1000 && (w.video3s || 0) >= 100
        ? w.video3s / w.impressions : -1;
    },
    delta: e => {
      const a = e.windows.L7.roas7, b = e.windows.P7.roas7;
      return (a != null && b) ? (a - b) / b : -99;
    },
  };
  rows.sort((a, b) => {
    const va = get[sortCol](a), vb = get[sortCol](b);
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });
  const cols = [
    ["name", "Name"], ["spend", "Spend"], ["roas", "NB ROAS"], ["rev", "NB Rev"],
    ["txns", "Txns"], ["proas", "Platform ROAS"],

  const thead = el("thead"); const trh = el("tr");
  cols.forEach(([id, label]) => {
    const th = el("th", sortCol === id ? "sorted" : null, label + (sortCol === id ? (sortDir < 0 ? " ↓" : " ↑") : ""));
    if (id === "hook") th.title = "Meta hook rate: 3-second video plays / impressions. <20% = weak opening, >=30% = strong.";
    if (id === "roas" || id === "rev") th.title = "Northbeam attributed — Clicks + Deterministic Views, 7-day window, accrual. Recent days still maturing.";
    if (id === "proas") th.title = "Platform-reported (Google Ads API; Meta via NB's Meta integration at 7d-click/1d-view). Direction only.";
    if (!["trend", "st"].includes(id)) th.addEventListener("click", () => {
      if (sortCol === id) sortDir *= -1; else { sortCol = id; sortDir = -1; }
      renderTable(container);
    });
    trh.appendChild(th);
  });
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = el("tbody");
  const shown = rows.slice(0, 60);
  for (const e of shown) {
    const w = e.windows[W];
    const tr = el("tr");
    const nameTd = el("td", "name");
    const pd = el("span", "pdot"); pd.style.background = PLAT_COLOR[e.platform] || "var(--s-other)";
    nameTd.appendChild(pd);
    nameTd.appendChild(document.createTextNode(entityName(e)));
    if (entitySub(e)) { const s = el("div", "muted"); s.style.fontSize = "11px"; s.textContent = entitySub(e); nameTd.appendChild(s); }
    nameTd.title = entityName(e) + (entitySub(e) ? " — " + entitySub(e) : "");
    tr.appendChild(nameTd);
    tr.appendChild(el("td", "num", fm$(w.spend || 0)));
    const rc = el("td", "num roascell", fmR(w.roas7));
    if (w.roas7 != null && (w.spend || 0) >= 100 && e.bucket === "core" && e.platform !== "tiktok") {
      rc.style.color = w.roas7 >= goal ? "var(--st-good)" : (w.roas7 >= 1.5 ? "inherit" : "var(--st-crit)");
      rc.appendChild(roasBar(w.roas7, goal));
    }
    tr.appendChild(rc);
    tr.appendChild(el("td", "num", fm$(w.rev7 || 0)));
    tr.appendChild(el("td", "num", String(w.txns || 0)));
    tr.appendChild(el("td", "num muted", fmR(w.p_roas)));
    if (levelSel === "ad") {
      const imp = w.impressions || 0, v3 = w.video3s || 0;
      const isVideo = !/static|image|carousel/i.test(e.ad_name || "");
      const show = isVideo && imp >= 1000 && v3 >= 100;
      const htd = el("td", "num muted", show ? Math.round(v3 / imp * 100) + "%" : "–");
      if (show && imp >= 5000) {
        const hr = v3 / imp;
        if (hr < 0.2) htd.className = "num delta down";

    const dv = get.delta(e);

    if (dv > -90) dtd.className += dv >= 0 ? " delta up" : " delta down";
    tr.appendChild(dtd);
    const sp = el("td");
    sp.appendChild(sparkline(e.daily.slice(-14).map(d => d.spend > 0 ? (d.rev7 || 0) / d.spend : null), 90, 26, goal));
    tr.appendChild(sp);

    const btd = el("td");
    const b = el("span", "badge " + bc); b.appendChild(el("span", "dot")); b.appendChild(document.createTextNode(bl));
    btd.appendChild(b); tr.appendChild(btd);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  container.appendChild(table);
  const notes = [];
  if (rows.length > shown.length) notes.push(`Showing top ${shown.length} of ${rows.length} by current sort — use search to narrow.`);
  if (zeroHidden > 0) notes.push(`${zeroHidden} rows with $0 spend in this window hidden — use "Show $0 rows" to include them.`);
  if (minRoasOn && roasHidden > 0) notes.push(`${roasHidden} rows below ${ROAS_FILTER} NB ROAS hidden by the working-only filter.`);
  if (notes.length) container.appendChild(el("div", "muted", notes.join(" ")));
}

/* ---------- channel summary with guidance ---------- */
function channelGuidance(label, roas, goal) {
  if (label.includes("Brand")) return "Judge on incrementality, not this ROAS. Pullback in flight — watch capture.";
  if (label.includes("TOF")) return "TOF: judge on MER + first-touch over 2-4 wks, never 7d clicks.";
  if (label.includes("TikTok")) return "NB attribution broken — decide on model views / MER.";
  if (label.includes("App")) return "Separate goals (installs / Amazon rev) — not ecom ROAS.";
  if (roas == null) return "";
  if (roas >= goal * 1.2) return "Scale in 15-20% steps; watch marginal ROAS.";
  if (roas >= goal) return "Hold. Next dollar goes to the scale rows.";
  if (roas >= 1.5) return "Fix creative/bids first — no new budget.";
  return "Cut to winners before adding anything.";
}

function channelSummary() {
  const goal = DATA.meta.goal_roas;
  const groups = {
    "Meta (core)":      e => e.platform === "meta" && e.bucket === "core",
    "Google (core)":    e => e.platform === "google" && e.bucket === "core",
    "Google Brand":     e => e.platform === "google" && e.bucket === "brand",

    "TikTok":           e => e.platform === "tiktok",
  };
  const card = el("div", "card");
  card.appendChild(el("h2", null, "Channel allocation — where the next dollar goes"));
  const table = el("table");
  const trh = el("tr");
  ["Bucket", "L7 spend", "share", "L7 NB ROAS", "Δ WoW", "L14 NB ROAS", "Platform ROAS", "What to do"].forEach((h, i) => {
    const th = el("th", null, h); if (i === 0 || i === 7) th.style.textAlign = "left"; trh.appendChild(th);
  });
  table.appendChild(trh);
  /* judged spend only — App/Amazon is managed off the client sheet, not allocated here */
  const camps = DATA.levels.campaign.filter(c => c.bucket !== "other");
  const totalL7 = camps.reduce((s, c) => s + (c.windows.L7.spend || 0), 0);
  const rowsAgg = [];
  for (const [label, pred] of Object.entries(groups)) {
    const g = camps.filter(pred);
    if (!g.length) continue;
    const agg = w => {
      const s = g.reduce((a, c) => a + (c.windows[w].spend || 0), 0);
      const r = g.reduce((a, c) => a + (c.windows[w].rev7 || 0), 0);
      const pv = g.reduce((a, c) => a + (c.windows[w].p_value || 0), 0);
      const ps = g.reduce((a, c) => a + (c.windows[w].p_spend || 0), 0);
      return {s, roas: s > 0 ? r / s : null, proas: ps > 0 ? pv / ps : null};
    };
    const l7 = agg("L7"), p7 = agg("P7"), l14 = agg("L14");
    rowsAgg.push({label, roas: l7.roas, s: l7.s});
    const tr = el("tr");
    const nt = el("td", null, label); nt.style.textAlign = "left"; nt.style.fontWeight = "600"; tr.appendChild(nt);
    tr.appendChild(el("td", "num", fm$(l7.s)));
    tr.appendChild(el("td", "num muted", totalL7 ? Math.round(l7.s / totalL7 * 100) + "%" : "–"));
    const rcell = el("td", "num roascell", fmR(l7.roas));
    if (label.includes("core") && l7.roas != null) rcell.appendChild(roasBar(l7.roas, goal));
    tr.appendChild(rcell);
    const d = (l7.roas != null && p7.roas) ? (l7.roas - p7.roas) / p7.roas : null;
    const dtd = el("td", "num", d == null ? "–" : (d > 0 ? "+" : "") + Math.round(d * 100) + "%");
    // color WoW only where 7d click ROAS is a valid judgment (core rows)
    const judgeable = label.includes("core");
    if (d != null && judgeable) dtd.className += d >= 0 ? " delta up" : " delta down";
    else dtd.className += " muted";
    tr.appendChild(dtd);
    tr.appendChild(el("td", "num", fmR(l14.roas)));
    tr.appendChild(el("td", "num muted", l7.proas ? fmR(l7.proas) : "–"));
    tr.appendChild(el("td", "guide", channelGuidance(label, l7.roas, goal)));
    table.appendChild(tr);
  }
  // takeaway: best and worst judgeable bucket
  const judge = rowsAgg.filter(r => r.label.includes("core") && r.roas != null);
  if (judge.length) {
    judge.sort((a, b) => b.roas - a.roas);
    const best = judge[0], worst = judge[judge.length - 1];
    card.insertBefore(takeaway(
      best.label + " leads at " + best.roas.toFixed(2) +
      (judge.length > 1 ? " — " + worst.label + " drags at " + worst.roas.toFixed(2) + " on " + fmK(worst.s) + " L7." : "."),
      best.roas >= goal ? "good" : "warn"), card.children[1]);
  }
  const scroll = el("div", "tscroll");
  scroll.appendChild(table);
  card.appendChild(scroll);
  return card;
}

function buildDetail(tcard) {

  tcard.appendChild(el("h2", null, creativePage ? "Ad-level detail" : "Performance detail"));

    // keep the card visually pinned: neutralize scroll-anchoring drift

function verdictBanner() {
  const m = DATA.meta, s = DATA.insights.summary, pac = DATA.insights.pacing || {};
  const dec = DATA.insights.decide || {do_now: [], scale: []};
  const goal = m.goal_roas;
  const roas = s.core_roas_l7;
  const paceOff = pac.pace != null ? Math.abs(pac.pace - 1) : 0;
  let sev = "good";
  if ((roas != null && roas < goal * 0.75) || dec.do_now.length >= 3 || paceOff > 0.2) sev = "bad";
  else if ((roas != null && roas < goal) || dec.do_now.length >= 1 || paceOff > 0.1) sev = "warn";
  const bits = [];
  if (roas != null) bits.push("core ROAS " + roas.toFixed(2) + " vs " + goal.toFixed(1) + " goal");
  if (pac.pace != null) bits.push("spend " + Math.round(pac.pace * 100) + "% of plan");
  if (dec.do_now.length) bits.push(dec.do_now.length + " campaign" + (dec.do_now.length > 1 ? "s" : "") + " need action today");
  const head = sev === "bad" ? "Action needed" : sev === "warn" ? "Off goal — fixable" : "On track";
  const v = el("div", "verdict v-" + sev);

  const cards = [
    ["pacing.html", "Pacing & trend",
     (pac.pace != null ? Math.round(pac.pace * 100) + "% vs plan MTD" : "") +
     (pac.yday && pac.yday.mer ? " · MER " + pac.yday.mer.toFixed(2) + " y'day" : "")],
    ["performance.html", "Performance & allocation",
     dec.do_now.length + " do-now · " + camps + " campaigns live"],
    ["creative.html", "Creative studio",
     leanIn + " variation candidates · " + weakHooks + " hooks to fix"],
    ["testing.html", "Testing lab",
     (t.graduate ? t.graduate + " graduate · " : "") + (t.kill || 0) + " kill · " + (t.in_test || 0) + " in test"],
    ["reference.html", "Reference",
     "routines · playbook · definitions"],
  ];
  const g = el("div", "navcards");
  cards.forEach(([href, title, teaser]) => {
    const a = document.createElement("a");
    a.href = href; a.className = "ncard";
    a.appendChild(el("div", "nc-title", title + " →"));
    a.appendChild(el("div", "nc-teaser", teaser));
    g.appendChild(a);
  });
  return g;
}
function miniFooter() {
  const f = el("footer");
  const a = document.createElement("a");
  a.href = "reference.html"; a.style.color = "inherit";
  a.textContent = "definitions & data rules →";
  f.appendChild(document.createTextNode("Data through " + DATA.meta.data_through + " · " + DATA.meta.attribution_label + " · "));
  f.appendChild(a);
  return f;
}

/* ---------- render ---------- */
function render() {
  const app = document.getElementById("app");
  app.replaceChildren();
  const m = DATA.meta;
  document.title = m.client + " — " + (PAGE_TITLES[PAGE] || PAGE);

  /* command bar: brand + meta + nav, verdict strip on the cockpit */
  const bar = el("div", "cmdbar");
  const brow = el("div", "brandrow");
  brow.appendChild(el("span", "wordmark", "Lower Cross"));
  brow.appendChild(el("h1", null, m.client));
  const meta = el("span", "meta");
  const addMeta = node => {
    if (meta.childNodes.length) meta.appendChild(el("span", "sep", "·"));
    meta.appendChild(node);
  };
  const gc = el("span"); gc.appendChild(document.createTextNode("Goal "));
  gc.appendChild(el("b", null, m.goal_roas.toFixed(1) + " NB ROAS"));
  addMeta(gc);
  addMeta(el("span", "attr", m.attribution_label));
  const yesterday = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
  const fresh = m.data_through >= yesterday;
  addMeta(el("span", fresh ? null : "stale",
    (fresh ? "Data through " : "STALE — data through ") + m.data_through));
  brow.appendChild(meta);
  brow.appendChild(el("span", "spacer"));
  const th = el("button", "ghost", "Theme");
  th.addEventListener("click", () => {
    const r = document.documentElement;
    const cur = r.getAttribute("data-theme") ||
      (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    r.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
    render();
  });
  brow.appendChild(th);
  bar.appendChild(brow);
  bar.appendChild(pageNav(PAGE));
  if (typeof PAGE !== "undefined" && PAGE === "cockpit") bar.appendChild(verdictBanner());
  app.appendChild(bar);
  app.appendChild(pageHead());

  const ins = DATA.insights;
  const dec = ins.decide || {do_now: [], scale: [], watch: []};
  /* decide today (rendered after tiles + trend) */
  const dcard = el("div", "card");
  dcard.appendChild(el("h2", null, "Decide today"));
  const dgrid = el("div", "decide");
  const mkCol = (cls, title, items, empty) => {
    const c = el("div", "dcol " + cls);
    const h = el("h3"); h.appendChild(el("span", "dot")); h.appendChild(document.createTextNode(title));
    c.appendChild(h);
    if (!items || !items.length) c.appendChild(el("div", "dempty", empty));
    (items || []).forEach(it => {
      const d = el("div", "ditem");
      d.appendChild(qwhat(it.what));
      d.appendChild(el("div", "a", it.action));
      if (it.detail && it.detail.length) {
        const kids = el("div", "dkids");
        it.detail.forEach(k => {
          const row = el("div", "dkid k-" + k.kind);
          row.appendChild(el("span", "kdot"));
          const prefix = k.kind === "pause" ? "pause: " : (k.kind === "best" ? "best inside: " : "winner: ");
          const nm = el("span", "knm", prefix + k.name);
          nm.title = k.name;
          row.appendChild(nm);
          row.appendChild(el("span", "kv", "$" + Math.round(k.spend).toLocaleString() + " · " + k.roas.toFixed(2)));
          kids.appendChild(row);
        });
        d.appendChild(kids);
      }
      c.appendChild(d);
    });
    return c;
  };
  dgrid.appendChild(mkCol("d-now", "DO NOW", dec.do_now, "Nothing bleeding. Good."));
  dgrid.appendChild(mkCol("d-scale", "SCALE", dec.scale, "No campaign meets the scale gate this week (needs " + (m.goal_roas * 1.2).toFixed(1) + "+ on $250+ L7)."));
  dgrid.appendChild(mkCol("d-watch", "WATCH", dec.watch, "Nothing deteriorating."));
  dcard.appendChild(dgrid);

  /* tiles */
  const s = ins.summary;
  const pacing = ins.pacing;
  const goal = m.goal_roas;
  const days = dailySeries();
  const tiles = el("div", "tiles");
  const mk = (lbl, val, deltaTxt, deltaCls, spark, status) => {
    const t = el("div", "tile");
    t.appendChild(el("div", "lbl", lbl));
    t.appendChild(el("div", "val", val));
    if (deltaTxt) {
      /* chip carries only the signed delta; anything after " · " becomes a quiet basis line */
      let chipTxt = null, basisTxt = deltaTxt;
      if (/^[+-]/.test(deltaTxt)) {
        const parts = deltaTxt.split(" · ");
        chipTxt = parts.shift();
        basisTxt = parts.join(" · ");
      }
      if (chipTxt) {
        if (/^\+/.test(chipTxt)) chipTxt = "▲ " + chipTxt.slice(1);
        else if (/^-\d/.test(chipTxt)) chipTxt = "▼ " + chipTxt.slice(1);
        t.appendChild(el("div", "delta " + (deltaCls || ""), chipTxt));
      }
      if (basisTxt) t.appendChild(el("div", "basis", basisTxt));
    }
    if (spark) t.appendChild(spark);
    return t;
  };
  const bandStatus = off => off == null ? "na" : Math.abs(off) <= 0.1 ? "good" : Math.abs(off) <= 0.2 ? "warn" : "bad";
  const p7roas = (() => {
    const c = DATA.levels.campaign.filter(x => x.bucket === "core");
    const sp = c.reduce((a, x) => a + (x.windows.P7.spend || 0), 0);
    const rv = c.reduce((a, x) => a + (x.windows.P7.rev7 || 0), 0);
    return sp > 0 ? rv / sp : null;
  })();
  const coreRoas = s.core_roas_l7;
  let dTxt = null, dCls = null;
  if (coreRoas != null && p7roas) {
    const dd = (coreRoas - p7roas) / p7roas;
    dTxt = (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs prior 7d";
    dCls = dd >= 0 ? "up" : "down";
  }
  const t1 = mk("Core NB ROAS — last 7 days", coreRoas == null ? "–" : coreRoas.toFixed(2), dTxt, dCls,
    null, coreRoas == null ? "na" : coreRoas >= goal ? "good" : coreRoas >= 1.5 ? "warn" : "bad");
  t1.querySelector(".val").style.color = coreRoas != null && coreRoas >= goal ? "var(--st-good)" : (coreRoas != null && coreRoas < 1.5 ? "var(--st-crit)" : "inherit");
  {
    /* progress to goal, tick at goal (track runs to 1.25x goal) */
    const gb = el("div", "goalbar");
    const fill = document.createElement("i");
    const frac = coreRoas == null ? 0 : Math.min(1, coreRoas / (goal * 1.25));
    fill.style.width = (frac * 100) + "%";
    fill.style.background = coreRoas == null ? "var(--grid)" :
      coreRoas >= goal ? "var(--st-good)" : coreRoas >= 1.5 ? "var(--st-warn)" : "var(--st-crit)";
    gb.appendChild(fill);
    const tick = el("span", "tick");
    tick.style.left = (100 / 1.25) + "%";
    gb.appendChild(tick);
    gb.title = "Goal " + goal.toFixed(1);
    t1.appendChild(gb);
  }
  tiles.appendChild(t1);
  const ydayFromSheet = pacing && pacing.yday && pacing.yday.spend;
  if (ydayFromSheet) {
    const plan = pacing.yday.plan;
    const dd = plan ? (pacing.yday.spend - plan) / plan : null;
    tiles.appendChild(mk("Spend yesterday (workbook)", fmK(pacing.yday.spend),
      plan ? (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs " + fmK(plan) + " plan" : null,
      dd != null && Math.abs(dd) > 0.1 ? "down" : "up", null, bandStatus(dd)));
  } else if (s.yday_spend != null) {
    const dd = s.avg7_daily_spend ? (s.yday_spend - s.avg7_daily_spend) / s.avg7_daily_spend : null;
    tiles.appendChild(mk("Spend yesterday (platforms)", fmK(s.yday_spend),
      dd == null ? null : (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs 7-day avg",
      dd != null && Math.abs(dd) > 0.25 ? "down" : null));
  }
  if (pacing && pacing.pace != null) {
    const pc = pacing.pace;
    const cls = Math.abs(pc - 1) <= 0.1 ? "up" : "down";
    const est = pacing.estimated_days ? ` (${pacing.estimated_days}d est.)` : "";
    const t = mk("MTD spend vs plan", Math.round(pc * 100) + "%",
      fmK(pacing.mtd_spend) + " vs " + fmK(pacing.mtd_plan) + " plan" + est, cls,
      null, bandStatus(pc - 1));
    t.title = pacing.source || "";
    t.querySelector(".val").style.color = Math.abs(pc - 1) <= 0.1 ? "var(--st-good)"
      : (Math.abs(pc - 1) <= 0.2 ? "inherit" : "var(--st-crit)");
    tiles.appendChild(t);
  }
  {
    // yesterday's sheet cells can be mid-edit (zero) — fall back to the last populated day
    const merRow = (pacing && pacing.yday && pacing.yday.mer) ? {...pacing.yday, when: "yesterday"}
      : (pacing && pacing.last_mer) ? {...pacing.last_mer, when: pacing.last_mer.date.slice(5).replace("-", "/")} : null;
    if (merRow) {
      const merT = DATA.meta.mer_target || 2.5;
      const t = mk("Blended MER — " + merRow.when, merRow.mer.toFixed(2),
        "rev " + fmK(merRow.rev || 0) + " · target " + merT.toFixed(1) + " · pacing workbook",
        null, null, merRow.mer >= merT ? "good" : merRow.mer >= merT * 0.75 ? "warn" : "bad");
      t.querySelector(".val").style.color = merRow.mer >= merT ? "var(--st-good)"
        : (merRow.mer < merT * 0.75 ? "var(--st-crit)" : "inherit");
      tiles.appendChild(t);
    }
  }
  if (s.cac_new_l7 != null) {
    const dd = s.cac_new_p7 ? (s.cac_new_l7 - s.cac_new_p7) / s.cac_new_p7 : null;
    // lower CAC is better: arrow shows direction, color shows goodness
    tiles.appendChild(mk("New-customer CAC — L7", fm$(s.cac_new_l7),
      (dd == null ? "" : (dd >= 0 ? "+" : "") + Math.round(dd * 100) + "% vs prior 7d · ")
        + (s.new_txns_l7 || 0) + " new customers (NB paid, ex-App/Amazon)",
      dd == null ? null : (dd <= 0 ? "up" : "down"),
      null, dd == null ? "na" : dd <= 0 ? "good" : dd <= 0.15 ? "warn" : "bad"));
  }
  if (s.new_visit_pct_l7 != null) {
    const dpp = s.new_visit_pct_p7 != null ? (s.new_visit_pct_l7 - s.new_visit_pct_p7) * 100 : null;
    tiles.appendChild(mk("New visitor % — L7", Math.round(s.new_visit_pct_l7 * 100) + "%",
      dpp == null ? "share of NB paid visits" : (dpp >= 0 ? "+" : "") + dpp.toFixed(1) + "pp vs prior 7d",
      dpp == null ? null : (dpp >= 0 ? "up" : "down"),
      null, dpp == null ? "na" : dpp >= 0 ? "good" : dpp > -3 ? "warn" : "bad"));
  }
  // mix-context tiles live on the pacing page; the cockpit stays one screen
  if (typeof PAGE === "undefined" || PAGE === "pacing") {
    tiles.appendChild(mk("TOF / Demand Gen L7", fmK(s.tof_spend_l7),
      s.total_spend_l7 ? Math.round(s.tof_spend_l7 / s.total_spend_l7 * 100) + "% of L7 platform spend" : "", null));
    tiles.appendChild(mk("Brand L7", fmK(s.brand_spend_l7),
      s.total_spend_l7 ? Math.round(s.brand_spend_l7 / s.total_spend_l7 * 100) + "% of L7 platform spend" : "", null));
  }
  if (PAGE === "pacing" || PAGE === "cockpit") app.appendChild(tiles);

  /* trend */
  const tc = el("div", "card");
  tc.appendChild(el("h2", null, "30-day trend"));
  {
    const rolls = days.map(d => d.roll).filter(v => v != null);
    const above = rolls.filter(v => v >= goal).length;
    const dir = rolls.length >= 8 ? (rolls[rolls.length - 1] - rolls[rolls.length - 8]) / rolls[rolls.length - 8] : null;
    const dirTxt = dir == null ? "" : Math.abs(dir) < 0.05 ? " and flat week-over-week" : dir > 0 ? " and improving (" + Math.round(dir * 100) + "% WoW)" : " and declining (" + Math.round(dir * 100) + "% WoW)";
    tc.appendChild(takeaway(
      above === 0
        ? "The 7-day line has not touched the " + goal.toFixed(1) + " goal once in 30 days — currently " + (rolls.length ? rolls[rolls.length - 1].toFixed(2) : "–") + dirTxt + ". This is structural, not a bad day."
        : above + " of the last " + rolls.length + " days at/above goal — currently " + rolls[rolls.length - 1].toFixed(2) + dirTxt + ".",
      above === 0 ? "bad" : above < rolls.length / 2 ? "warn" : "good"));
  }
  tc.appendChild(trendChart(days));
  if (PAGE === "pacing") app.appendChild(tc);

  /* decide today — after the numbers, before allocation */
  if (PAGE === "performance") app.appendChild(dcard);
  if (PAGE === "performance" && DATA.changes && DATA.changes.items && DATA.changes.items.length)
    app.appendChild(changeLog());

  /* channel allocation */
  if (PAGE === "performance") app.appendChild(channelSummary());

  /* routine */
  const rc = el("div", "card");
  rc.appendChild(el("h2", null, "How to run this dashboard"));
  const rgrid = el("div", "routine");
  const mkRoutine = (title, steps) => {
    const d = el("div");
    d.appendChild(el("h2", null, title));
    const ol = el("ol");
    steps.forEach(([b, rest]) => {
      const li = el("li");
      li.appendChild(el("b", null, b + " "));
      li.appendChild(document.createTextNode(rest));
      ol.appendChild(li);
    });
    d.appendChild(ol);
    return d;
  };
  rgrid.appendChild(mkRoutine("Daily — 5 minutes", [
    ["Freshness:", "the chip up top must say data through yesterday. If STALE, fix the pipeline before trusting anything."],
    ["Clear DO NOW:", "act on every red item, today. That's the whole daily job."],
    ["Pacing:", "spend yesterday + MTD vs plan. Off by >10%, adjust budgets."],
    ["Don't judge ROAS daily:", "recent accrual is still maturing (shaded zone). No kill/scale calls on <72h."],
  ]));
  rgrid.appendChild(mkRoutine("Weekly — Monday, 30 minutes", [
    ["Scale & cut:", "work the SCALE and WATCH queues plus campaign badges on L7/L14 windows."],
    ["Creative:", "kill weak hooks after $500-1K spend, brief iterations on the strongest angles."],
    ["Allocation:", "move the next dollar where the LAST dollar returned most (channel table guidance)."],
    ["Reconcile:", "platform vs NB divergence — decide on NB, use platform for direction only."],
  ]));
  rc.appendChild(rgrid);
  if (PAGE === "reference") app.appendChild(rc);

  /* weekly section */
  const sh = el("div", "section-h");
  sh.appendChild(el("h2", null, "Creative review"));
  sh.appendChild(el("span", "sub", "Meta creative on NB numbers · kill/scale creatives only after $500-1K spend"));
  if (PAGE === "creative") app.appendChild(sh);

  if (PAGE === "testing" && DATA.creative && DATA.creative.testing) app.appendChild(testingMonitor());
  if (PAGE === "creative") app.appendChild(creativeHealth());
  if (PAGE === "creative" && DATA.creative) app.appendChild(creativeIntelligence());

  /* detail tables — self-rebuilding card so toggles never repaint the page */
  const tcard = el("div", "card");
  buildDetail(tcard);
  if (PAGE === "performance" || PAGE === "creative") app.appendChild(tcard);
  if (PAGE === "cockpit") {
    const wrow = el("div", "wrow");
    wrow.appendChild(goalTrackCard(days));
    wrow.appendChild(spendMixCard());
    wrow.appendChild(calloutsCard());
    app.appendChild(wrow);
    app.appendChild(decideMini());
    app.appendChild(navCards());
  }
  if (PAGE === "ltv") ltvPage(app);

  /* working / attention (weekly evidence) */
  const insWrap = el("div", "card");
  insWrap.appendChild(el("h2", null, "Evidence — what's working / what needs attention"));
  const grid = el("div", "insights");
  const mkList = (title, items) => {
    const d = el("div");
    d.appendChild(el("h2", null, title));
    const ul = el("ul");
    (items || []).forEach(it => {
      const li = el("li", "sev-" + (it.sev || "info"));
      li.textContent = it.text;
      ul.appendChild(li);
    });
    if (!items || !items.length) ul.appendChild(el("li", "muted", "Nothing at current thresholds."));
    d.appendChild(ul);
    return d;
  };
  grid.appendChild(mkList("Working", ins.working));
  grid.appendChild(mkList("Needs attention", ins.issues));
  insWrap.appendChild(grid);
  if (PAGE === "performance") app.appendChild(insWrap);

  /* context + playbook */
  const cx = el("div", "card ctx");
  cx.appendChild(el("h2", null, "Context — what's in flight"));
  const cul = el("ul", "insights");
  (m.context || []).forEach(c => {
    const li = el("li");
    li.appendChild(el("span", "d", c.date));
    li.appendChild(document.createTextNode(c.text));
    cul.appendChild(li);
  });
  cx.appendChild(cul);
  const det = el("details");
  det.appendChild(el("summary", null, "Playbook rules this dashboard applies"));
  const pul = el("ul");
  (m.playbook || []).forEach(p => { const li = el("li"); li.style.margin = "6px 0"; li.style.fontSize = "12.5px"; li.textContent = p; pul.appendChild(li); });
  det.appendChild(pul);
  cx.appendChild(det);
  if (PAGE === "pacing") app.appendChild(cx);

  /* footer */
  const f = el("footer");
  f.appendChild(el("div", null, "Definitions & data rules"));
  const ful = el("ul");
  (m.notes || []).forEach(nt => ful.appendChild(el("li", null, nt)));
  ful.appendChild(el("li", null, "Generated " + m.generated_at + " · Sources: Northbeam export API (attribution + Meta platform-reported at 7d-click/1d-view), Google Ads API (platform)."));
  f.appendChild(ful);
  if (PAGE === "reference") app.appendChild(f);
  else app.appendChild(miniFooter());
}
</script>
</body>
</html>
